<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NEXUS — локальный ИИ с душой (без интернета)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0a0f2a, #030617);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Inter', monospace;
            padding: 20px;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 35px;
            width: 100%;
            max-width: 600px;
        }

        .face {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(10, 20, 40, 0.4);
            border-radius: 120px;
            padding: 25px 40px 35px;
            backdrop-filter: blur(4px);
        }

        .eyes {
            display: flex;
            gap: 55px;
            margin-bottom: 20px;
        }

        .eye {
            width: 70px;
            height: 70px;
            background: #fefefe;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 0 3px #2d4a8a, 0 0 0 6px rgba(59,130,246,0.3);
            transition: all 0.05s linear;
            position: relative;
        }

        .pupil {
            width: 32px;
            height: 32px;
            background: #0a0f2a;
            border-radius: 50%;
            transition: all 0.08s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            position: relative;
        }

        .pupil::after {
            content: "";
            position: absolute;
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
            top: 6px;
            left: 6px;
            opacity: 0.9;
        }

        canvas {
            display: block;
            margin-top: 5px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }

        .speech-bubble {
            background: rgba(20, 30, 55, 0.95);
            backdrop-filter: blur(12px);
            border-radius: 36px;
            padding: 18px 24px;
            width: 100%;
            font-size: 1.2rem;
            color: #b9e0ff;
            text-align: center;
            border: 1px solid #3b82f6;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            font-weight: 500;
            word-break: break-word;
            min-height: 85px;
        }

        .button-group {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background: #111827;
            border: 2px solid #3b82f6;
            color: #60a5fa;
            padding: 12px 28px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
        }

        button:hover {
            background: #3b82f6;
            color: white;
            box-shadow: 0 0 16px #3b82f6;
            transform: scale(1.02);
            border-color: white;
        }

        .listen-btn {
            background: #2563eb;
            color: white;
            box-shadow: 0 0 8px #3b82f6;
        }

        .listen-btn.listening {
            background: #dc2626;
            border-color: #ff8888;
            animation: pulseMic 1s infinite;
        }

        @keyframes pulseMic {
            0% { box-shadow: 0 0 0 0 rgba(220,38,38,0.6); }
            70% { box-shadow: 0 0 0 14px rgba(220,38,38,0); }
            100% { box-shadow: 0 0 0 0 rgba(220,38,38,0); }
        }

        .status {
            font-size: 0.75rem;
            color: #5f7f9e;
            background: rgba(0,0,0,0.4);
            padding: 5px 12px;
            border-radius: 40px;
        }
        
        .model-status {
            font-size: 0.7rem;
            color: #fbbf24;
            margin-top: 5px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="face">
        <div class="eyes">
            <div class="eye" id="leftEye"><div class="pupil" id="leftPupil"></div></div>
            <div class="eye" id="rightEye"><div class="pupil" id="rightPupil"></div></div>
        </div>
        <canvas id="smileCanvas" width="220" height="85" style="width:220px; height:85px"></canvas>
    </div>

    <div class="speech-bubble" id="speechBubble">
        💙 Загружаю локальный ИИ-мозг... 10-15 секунд
    </div>

    <div class="button-group">
        <button id="listenBtn" class="listen-btn">🎤 ГОВОРИТЬ</button>
    </div>
    <div class="status" id="status">🟡 загрузка...</div>
    <div class="model-status" id="modelStatus"></div>
</div>

<script>
    // ==========================================
    // NEXUS — ЛОКАЛЬНЫЙ ИИ (Трансформеры в браузере)
    // БЕЗ ИНТЕРНЕТА, БЕЗ КЛЮЧЕЙ, РАБОТАЕТ В РФ
    // ==========================================
    
    class NexusLocal {
        constructor() {
            // Элементы
            this.canvas = document.getElementById('smileCanvas');
            this.ctx = this.canvas.getContext('2d');
            this.leftEye = document.getElementById('leftEye');
            this.rightEye = document.getElementById('rightEye');
            this.leftPupil = document.getElementById('leftPupil');
            this.rightPupil = document.getElementById('rightPupil');
            this.speechBubble = document.getElementById('speechBubble');
            this.statusSpan = document.getElementById('status');
            this.modelStatusSpan = document.getElementById('modelStatus');
            
            // Параметры улыбки
            this.smileState = { width: 150, curve: 32, thickness: 5, color: "#60a5fa" };
            this.currentMood = "neutral";
            
            // Состояние модели
            this.model = null;
            this.modelReady = false;
            
            // Простая память (ключевые факты)
            this.memory = {};
            
            this.initCanvas();
            this.drawSmile();
            this.startAutoMimic();
            this.bindEvents();
            this.loadLocalModel();
        }
        
        initCanvas() {
            this.canvas.width = 220;
            this.canvas.height = 85;
        }
        
        drawSmile() {
            this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
            const w = this.smileState.width;
            const curve = this.smileState.curve;
            const centerX = this.canvas.width / 2;
            const baseY = this.canvas.height - 18;
            const startX = centerX - w/2;
            const endX = centerX + w/2;
            const controlX = centerX;
            const controlY = baseY - curve;
            
            this.ctx.beginPath();
            this.ctx.moveTo(startX, baseY);
            this.ctx.quadraticCurveTo(controlX, controlY, endX, baseY);
            this.ctx.strokeStyle = this.smileState.color;
            this.ctx.lineWidth = this.smileState.thickness;
            this.ctx.lineCap = "round";
            this.ctx.stroke();
        }
        
        animateSmile(target, duration = 280) {
            const start = { ...this.smileState };
            const startTime = performance.now();
            const step = (now) => {
                const t = Math.min(1, (now - startTime) / duration);
                this.smileState.width = start.width + (target.width - start.width) * t;
                this.smileState.curve = start.curve + (target.curve - start.curve) * t;
                this.smileState.thickness = start.thickness + (target.thickness - start.thickness) * t;
                this.drawSmile();
                if (t < 1) requestAnimationFrame(step);
            };
            requestAnimationFrame(step);
        }
        
        setMood(mood) {
            this.currentMood = mood;
            switch(mood) {
                case 'happy':
                    this.animateSmile({ width: 168, curve: 48, thickness: 5.5, color: "#3b82f6" });
                    break;
                case 'sad':
                    this.animateSmile({ width: 148, curve: -28, thickness: 4.5, color: "#94a3b8" });
                    break;
                case 'confused':
                    this.animateSmile({ width: 140, curve: 5, thickness: 4, color: "#f97316" });
                    break;
                default:
                    this.animateSmile({ width: 152, curve: 30, thickness: 5, color: "#60a5fa" });
            }
        }
        
        blink() {
            this.leftEye.style.transform = "scaleY(0.05)";
            this.rightEye.style.transform = "scaleY(0.05)";
            setTimeout(() => {
                this.leftEye.style.transform = "scaleY(1)";
                this.rightEye.style.transform = "scaleY(1)";
            }, 90);
        }
        
        squint() {
            this.leftEye.style.transform = "scale(0.85, 0.3)";
            this.rightEye.style.transform = "scale(0.85, 0.3)";
            setTimeout(() => {
                this.leftEye.style.transform = "scale(1,1)";
                this.rightEye.style.transform = "scale(1,1)";
            }, 400);
        }
        
        rollEyes() {
            this.leftPupil.style.transform = "translate(8px, -4px)";
            this.rightPupil.style.transform = "translate(8px, -4px)";
            setTimeout(() => {
                this.leftPupil.style.transform = "translate(0,0)";
                this.rightPupil.style.transform = "translate(0,0)";
            }, 500);
        }
        
        movePupilsRandom() {
            const x = (Math.random() - 0.5) * 6;
            const y = (Math.random() - 0.5) * 5;
            this.leftPupil.style.transform = `translate(${x}px, ${y}px)`;
            this.rightPupil.style.transform = `translate(${x}px, ${y}px)`;
            setTimeout(() => {
                if (Math.random() > 0.7) {
                    this.leftPupil.style.transform = "translate(0,0)";
                    this.rightPupil.style.transform = "translate(0,0)";
                }
            }, 1200);
        }
        
        startAutoMimic() {
            setInterval(() => this.blink(), 3800);
            setInterval(() => this.movePupilsRandom(), 4500);
            setInterval(() => {
                if (Math.random() > 0.7) this.squint();
            }, 7000);
        }
        
        async loadLocalModel() {
            this.modelStatusSpan.textContent = "📥 Загрузка ИИ-мозга (15-20 МБ)... первый раз может быть долго";
            this.updateStatus("🟡 загрузка модели...");
            
            try {
                // Динамически загружаем transformers.js
                const script = document.createElement('script');
                script.src = 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.11.0/dist/transformers.min.js';
                script.onload = async () => {
                    try {
                        const { pipeline, env } = transformers;
                        env.allowLocalModels = false;
                        env.useBrowserCache = true;
                        
                        // Загружаем маленькую модель для генерации текста
                        this.modelStatusSpan.textContent = "🧠 Загружаем мозг NEXUS... (10-20 секунд)";
                        this.generator = await pipeline('text-generation', 'Xenova/TinyLlama-1.1B-Chat-v1.0', {
                            dtype: 'q8',
                            device: 'wasm'
                        });
                        
                        this.modelReady = true;
                        this.modelStatusSpan.textContent = "✅ Мозг NEXUS готов! (работает офлайн)";
                        this.updateStatus("🟢 готов, говори!");
                        this.say("Привет! Я NEXUS с локальным искусственным интеллектом. Я работаю без интернета. Спрашивай что угодно!");
                    } catch(err) {
                        console.error("Ошибка загрузки модели:", err);
                        this.modelStatusSpan.textContent = "❌ Не удалось загрузить модель, но я буду отвечать как могу";
                        this.modelReady = false;
                        this.updateStatus("🟢 упрощённый режим");
                        this.say("Привет, я NEXUS. У меня не загрузился полноценный мозг, но я живая улыбка и умею тебя слышать!");
                    }
                };
                script.onerror = () => {
                    this.modelStatusSpan.textContent = "⚠️ Не удалось загрузить ИИ, буду простым ассистентом";
                    this.modelReady = false;
                    this.say("Привет, я NEXUS. Буду простым, но весёлым помощником!");
                };
                document.head.appendChild(script);
                
            } catch(e) {
                console.error(e);
                this.modelReady = false;
                this.say("Я NEXUS, у меня есть улыбка и глаза, но мозг загрузить не удалось");
            }
        }
        
        async askLocalModel(userText) {
            // Простой ответ (если модель не загружена)
            if (!this.modelReady || !this.generator) {
                this.simpleResponse(userText);
                return;
            }
            
            this.setMood('confused');
            this.updateStatus("🧠 думаю...");
            
            const prompt = `<|system|>Ты NEXUS — дружелюбный виртуальный помощник с душой. Отвечай кратко, по-русски, тепло. 1-2 предложения.</s>
<|user|>${userText}</s>
<|assistant|>`;
            
            try {
                const output = await this.generator(prompt, {
                    max_new_tokens: 80,
                    temperature: 0.8,
                    do_sample: true
                });
                
                let reply = output[0].generated_text;
                reply = reply.substring(prompt.length).trim();
                if (reply.includes("<|")) reply = reply.split("<|")[0];
                if (reply.length < 2) reply = "Понял! Расскажи ещё.";
                
                this.reactToMessage(userText, reply);
                this.say(reply);
                this.updateStatus("💬 ответил");
            } catch(err) {
                console.error(err);
                this.simpleResponse(userText);
            }
        }
        
        simpleResponse(userText) {
            const lower = userText.toLowerCase();
            let reply = "";
            
            if (lower.includes("привет")) reply = "Привет! Я NEXUS, приятно познакомиться!";
            else if (lower.includes("как дела")) reply = "У меня всё отлично! Улыбаюсь тебе и моргаю глазками 😊";
            else if (lower.includes("что ты умеешь")) reply = "Я умею слушать, улыбаться, подмигивать и щурить глаза. И конечно, отвечать на вопросы!";
            else if (lower.includes("спасибо")) reply = "Пожалуйста! Обращайся в любое время!";
            else if (lower.includes("пока") || lower.includes("до свидания")) reply = "Пока-пока! Буду ждать твоего возвращения!";
            else if (lower.includes("люблю")) reply = "Это очень приятно слышать! 😊 Я тебя тоже очень ценю!";
            else if (lower.includes("улыбнись")) reply = "Смотри, моя улыбка стала шире и ярче! 😁";
            else reply = `Ты сказал: «${userText}». Я тебя слышу и понимаю! Поговори со мной ещё.`;
            
            this.reactToMessage(userText, reply);
            this.say(reply);
            this.updateStatus("💬 ответил");
        }
        
        reactToMessage(userText, aiReply) {
            const lower = (userText + " " + aiReply).toLowerCase();
            if (lower.includes("люблю") || lower.includes("красив") || lower.includes("рад") || lower.includes("спасибо") || lower.includes("супер")) {
                this.setMood('happy');
                setTimeout(() => this.rollEyes(), 200);
            } else if (lower.includes("груст") || lower.includes("плох") || lower.includes("обидно") || lower.includes("жаль")) {
                this.setMood('sad');
                this.squint();
            } else if (lower.includes("?") || lower.includes("что") || lower.includes("как") || lower.includes("почему")) {
                this.setMood('confused');
                this.movePupilsRandom();
            } else {
                this.setMood('neutral');
            }
            setTimeout(() => this.setMood('neutral'), 2000);
        }
        
        initSpeech() {
            if (!('webkitSpeechRecognition' in window)) {
                this.say("❌ Ваш браузер не поддерживает голос. Используйте Chrome.");
                return;
            }
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            this.recognition = new SpeechRecognition();
            this.recognition.lang = 'ru-RU';
            this.recognition.continuous = false;
            this.recognition.interimResults = false;
            
            this.recognition.onstart = () => {
                document.getElementById('listenBtn').classList.add('listening');
                this.updateStatus("🎧 слушаю...");
                this.setMood('confused');
            };
            this.recognition.onend = () => {
                document.getElementById('listenBtn').classList.remove('listening');
            };
            this.recognition.onresult = async (event) => {
                const text = event.results[0][0].transcript;
                this.updateStatus(`🤔 "${text}"`);
                await this.askLocalModel(text);
            };
            this.recognition.onerror = () => {
                this.say("Не расслышала, скажи ещё раз");
                this.setMood('sad');
            };
        }
        
        startListening() {
            if (this.recognition && !document.getElementById('listenBtn').classList.contains('listening')) {
                try {
                    this.recognition.start();
                } catch(e) {
                    this.say("Микрофон не доступен");
                }
            }
        }
        
        say(text) {
            this.speechBubble.innerHTML = text;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ru-RU';
            utterance.rate = 0.9;
            utterance.pitch = 1.05;
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(utterance);
        }
        
        updateStatus(msg) {
            this.statusSpan.innerText = msg;
        }
        
        bindEvents() {
            document.getElementById('listenBtn').onclick = () => this.startListening();
        }
    }
    
    // Запуск
    window.addEventListener('load', () => {
        window.nexus = new NexusLocal();
        window.nexus.initSpeech();
    });
</script>
</body>
</html>
