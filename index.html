<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NEXUS — задаёт вопросы + объясняет слова</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            background: radial-gradient(circle at 20% 30%, #0a0f2a, #030617);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Inter', monospace;
            padding: 20px;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            width: 100%;
            max-width: 600px;
        }
        .face {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(10, 20, 40, 0.4);
            border-radius: 120px;
            padding: 25px 40px 35px;
            backdrop-filter: blur(4px);
        }
        .eyes { display: flex; gap: 55px; margin-bottom: 20px; }
        .eye {
            width: 70px; height: 70px; background: #fefefe; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 0 3px #2d4a8a, 0 0 0 6px rgba(59,130,246,0.3);
            transition: all 0.05s linear;
        }
        .pupil {
            width: 32px; height: 32px; background: #0a0f2a; border-radius: 50%;
            transition: all 0.08s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            position: relative;
        }
        .pupil::after {
            content: ""; position: absolute; width: 10px; height: 10px;
            background: white; border-radius: 50%; top: 6px; left: 6px; opacity: 0.9;
        }
        canvas { display: block; margin-top: 5px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3)); }
        .speech-bubble {
            background: rgba(20, 30, 55, 0.95); backdrop-filter: blur(12px);
            border-radius: 36px; padding: 18px 24px; width: 100%; font-size: 1.2rem;
            color: #b9e0ff; text-align: center; border: 1px solid #3b82f6;
            word-break: break-word; min-height: 85px;
        }
        .button-group {
            display: flex; gap: 15px; flex-wrap: wrap; justify-content: center;
        }
        button {
            background: #111827; border: 2px solid #3b82f6; color: #60a5fa;
            padding: 12px 20px; font-size: 1rem; font-weight: bold;
            border-radius: 60px; cursor: pointer; transition: 0.2s; font-family: inherit;
        }
        button:hover { background: #3b82f6; color: white; box-shadow: 0 0 16px #3b82f6; }
        .listen-btn { background: #2563eb; color: white; }
        .listen-btn.listening { background: #dc2626; animation: pulseMic 1s infinite; }
        @keyframes pulseMic {
            0% { box-shadow: 0 0 0 0 rgba(220,38,38,0.6); }
            70% { box-shadow: 0 0 0 14px rgba(220,38,38,0); }
            100% { box-shadow: 0 0 0 0 rgba(220,38,38,0); }
        }
        .status { font-size: 0.75rem; color: #5f7f9e; background: rgba(0,0,0,0.4); padding: 5px 12px; border-radius: 40px; }
        .memory-panel { background: rgba(0,0,0,0.5); border-radius: 20px; padding: 10px 15px; width: 100%; font-size: 0.75rem; color: #8ba9d4; text-align: center; cursor: pointer; }
        .memory-panel:hover { background: rgba(59,130,246,0.3); }
        .question-badge {
            background: rgba(59,130,246,0.2);
            border-radius: 20px;
            padding: 5px 12px;
            font-size: 0.7rem;
            color: #60a5fa;
            display: inline-block;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="face">
        <div class="eyes">
            <div class="eye"><div class="pupil" id="leftPupil"></div></div>
            <div class="eye"><div class="pupil" id="rightPupil"></div></div>
        </div>
        <canvas id="smileCanvas" width="220" height="85"></canvas>
    </div>
    <div class="speech-bubble" id="speechBubble">
        💙 Я NEXUS. Можешь спросить значение любого слова!
    </div>
    <div class="button-group">
        <button id="listenBtn" class="listen-btn">🎤 ГОВОРИТЬ</button>
    </div>
    <div class="status" id="status">🟢 готов</div>
    <div class="memory-panel" id="memoryPanel">📚 ПОКАЗАТЬ ПАМЯТЬ</div>
</div>

<script>
    // ==================================================
    // NEXUS — ЗАДАЁТ ВОПРОСЫ + ОБЪЯСНЯЕТ СЛОВА
    // ==================================================
    class NexusFull {
        constructor() {
            // Элементы
            this.canvas = document.getElementById('smileCanvas');
            this.ctx = this.canvas.getContext('2d');
            this.leftPupil = document.getElementById('leftPupil');
            this.rightPupil = document.getElementById('rightPupil');
            this.speechBubble = document.getElementById('speechBubble');
            this.statusSpan = document.getElementById('status');
            
            // Память пользователя
            this.mem = {
                USER_NAME: null,
                USER_AGE: null,
                USER_CITY: null,
                FAVORITE_FOOD: null,
                USER_HOBBIES: [],
                FAMILY: null,
                JOB_TITLE: null,
                // Словарь (слово -> определение)
                DICTIONARY: {}
            };
            
            // Какие вопросы уже задавал (чтобы не повторяться)
            this.askedQuestions = {
                name: false,
                age: false,
                city: false,
                food: false,
                hobby: false,
                family: false
            };
            
            this.loadMemory();
            this.initCanvas();
            this.drawSmile();
            this.startAutoMimic();
            this.initSpeech();
            this.bindEvents();
            
            // Через 2 секунды задать первый вопрос, если память пуста
            setTimeout(() => this.askNextQuestion(), 2000);
            
            this.updateStatus("🟢 готов отвечать на вопросы и объяснять слова");
        }
        
        loadMemory() {
            const saved = localStorage.getItem('nexus_full_v2');
            if (saved) {
                const loaded = JSON.parse(saved);
                Object.assign(this.mem, loaded);
                if (this.mem.askedQuestions) Object.assign(this.askedQuestions, this.mem.askedQuestions);
            }
        }
        
        saveMemory() {
            const toSave = {
                ...this.mem,
                askedQuestions: this.askedQuestions
            };
            localStorage.setItem('nexus_full_v2', JSON.stringify(toSave));
        }
        
        // ========= NEXUS САМ ЗАДАЁТ ВОПРОСЫ =========
        askNextQuestion() {
            // Если уже есть имя — не спрашиваем
            if (!this.mem.USER_NAME && !this.askedQuestions.name) {
                this.askedQuestions.name = true;
                this.saveMemory();
                this.say("👋 Привет! А как тебя зовут? Я хочу запомнить твоё имя.");
                return;
            }
            
            if (this.mem.USER_NAME && !this.mem.USER_AGE && !this.askedQuestions.age) {
                this.askedQuestions.age = true;
                this.saveMemory();
                this.say(`Приятно познакомиться, ${this.mem.USER_NAME}! Сколько тебе лет?`);
                return;
            }
            
            if (this.mem.USER_NAME && !this.mem.USER_CITY && !this.askedQuestions.city) {
                this.askedQuestions.city = true;
                this.saveMemory();
                this.say(`А в каком городе ты живёшь, ${this.mem.USER_NAME}?`);
                return;
            }
            
            if (this.mem.USER_NAME && !this.mem.FAVORITE_FOOD && !this.askedQuestions.food) {
                this.askedQuestions.food = true;
                this.saveMemory();
                this.say(`Расскажи, ${this.mem.USER_NAME}, что ты любишь есть?`);
                return;
            }
            
            if (this.mem.USER_NAME && this.mem.USER_HOBBIES.length === 0 && !this.askedQuestions.hobby) {
                this.askedQuestions.hobby = true;
                this.saveMemory();
                this.say(`Чем ты увлекаешься в свободное время, ${this.mem.USER_NAME}? У тебя есть хобби?`);
                return;
            }
            
            if (this.mem.USER_NAME && !this.mem.FAMILY && !this.askedQuestions.family) {
                this.askedQuestions.family = true;
                this.saveMemory();
                this.say(`У тебя есть семья, ${this.mem.USER_NAME}?`);
                return;
            }
        }
        
        // ========= ОБУЧЕНИЕ: ЗАПОМИНАНИЕ ИЗ ФРАЗ =========
        learnFromText(text) {
            const lower = text.toLowerCase();
            let learned = false;
            let response = null;
            
            // Имя
            let nameMatch = text.match(/меня зовут\s+(\S+)/i) || text.match(/моё имя\s+(\S+)/i) || text.match(/я\s+(\S+)\s*$/i);
            if (nameMatch && !this.mem.USER_NAME && !learned) {
                this.mem.USER_NAME = nameMatch[1];
                this.saveMemory();
                response = `Приятно познакомиться, ${this.mem.USER_NAME}! Я запомнил твоё имя.`;
                learned = true;
                setTimeout(() => this.askNextQuestion(), 1500);
            }
            
            // Возраст
            let ageMatch = text.match(/мне\s+(\d+)\s*лет?/i) || text.match(/возраст\s+(\d+)/i);
            if (ageMatch && !learned) {
                this.mem.USER_AGE = ageMatch[1];
                this.saveMemory();
                response = `Запомнил: тебе ${this.mem.USER_AGE} лет.`;
                learned = true;
                setTimeout(() => this.askNextQuestion(), 1500);
            }
            
            // Город
            let cityMatch = text.match(/я живу в\s+(\S+)/i) || text.match(/мой город\s+(\S+)/i);
            if (cityMatch && !learned) {
                this.mem.USER_CITY = cityMatch[1];
                this.saveMemory();
                response = `Понял, ты живёшь в ${this.mem.USER_CITY}.`;
                learned = true;
                setTimeout(() => this.askNextQuestion(), 1500);
            }
            
            // Еда
            let foodMatch = text.match(/я люблю есть\s+(.+)/i) || text.match(/люблю есть\s+(.+)/i) || text.match(/моя любимая еда\s+(.+)/i);
            if (foodMatch && !learned) {
                this.mem.FAVORITE_FOOD = foodMatch[1];
                this.saveMemory();
                response = `Запомнил: ты любишь есть ${this.mem.FAVORITE_FOOD}. Вкусно!`;
                learned = true;
                setTimeout(() => this.askNextQuestion(), 1500);
            }
            
            // Хобби
            let hobbyMatch = text.match(/моё хобби\s+(.+)/i) || text.match(/я увлекаюсь\s+(.+)/i) || text.match(/хобби\s+(.+)/i);
            if (hobbyMatch && !learned) {
                const hobby = hobbyMatch[1];
                if (!this.mem.USER_HOBBIES.includes(hobby)) {
                    this.mem.USER_HOBBIES.push(hobby);
                    this.saveMemory();
                    response = `Класс! ${hobby} — отличное хобби. Я запомнил.`;
                    learned = true;
                    setTimeout(() => this.askNextQuestion(), 1500);
                }
            }
            
            // Семья
            let familyMatch = text.match(/у меня есть семья\s*(.+)/i) || text.match(/моя семья\s+(.+)/i) || text.match(/у меня (есть |\s)(мама|папа|жена|муж|дети)/i);
            if (familyMatch && !learned) {
                this.mem.FAMILY = text;
                this.saveMemory();
                response = `Понял, ${this.mem.USER_NAME || "друг"}. Я запомнил про твою семью.`;
                learned = true;
            }
            
            // Запоминание слов: "запомни слово X — это значит Y"
            let dictMatch = text.match(/запомни слово\s+(\S+)\s+[-–—это]+\s+(.+)/i);
            if (dictMatch && !learned) {
                const word = dictMatch[1].toLowerCase();
                const meaning = dictMatch[2];
                this.mem.DICTIONARY[word] = meaning;
                this.saveMemory();
                response = `✅ Запомнил: «${word}» — это ${meaning}. Теперь я знаю это слово!`;
                learned = true;
            }
            
            return { learned, response };
        }
        
        // ========= ОБЪЯСНЕНИЕ СЛОВ =========
        explainWord(text) {
            const lower = text.toLowerCase();
            
            // "что значит X", "объясни слово X", "я не понимаю X", "расскажи значение X"
            let wordMatch = text.match(/что значит\s+(\S+)/i) ||
                           text.match(/объясни слово\s+(\S+)/i) ||
                           text.match(/я не понимаю\s+(\S+)/i) ||
                           text.match(/значение слова\s+(\S+)/i) ||
                           text.match(/расскажи что такое\s+(\S+)/i);
            
            if (wordMatch) {
                const word = wordMatch[1].toLowerCase();
                
                // Сначала ищем в словаре пользователя
                if (this.mem.DICTIONARY[word]) {
                    return `📖 «${word}» — это ${this.mem.DICTIONARY[word]}. Так ты мне объяснил!`;
                }
                
                // Встроенные определения (базовые)
                const definitions = {
                    "нейросеть": "это компьютерная программа, которая учится на примерах, как человеческий мозг",
                    "алгоритм": "это пошаговая инструкция для решения задачи",
                    "дедлайн": "это крайний срок выполнения задачи",
                    "искусственный интеллект": "это способность компьютера делать вещи, которые обычно требуют человеческого ума",
                    "бэкенд": "это серверная часть сайта или приложения",
                    "фронтенд": "это то, что видит пользователь: кнопки, картинки, текст",
                    "нейрон": "это клетка мозга, которая передаёт сигналы",
                    "глубокое обучение": "это метод обучения нейросетей с множеством слоёв",
                    "чат-бот": "это программа, которая общается с человеком как собеседник",
                    "api": "это способ для разных программ общаться друг с другом",
                    "пиксель": "это самая маленькая точка на экране",
                    "баг": "это ошибка в программе",
                    "фикс": "это исправление ошибки",
                    "криптовалюта": "это цифровые деньги, защищённые шифрованием"
                };
                
                if (definitions[word]) {
                    return `📖 «${word}» — ${definitions[word]}. Хочешь, объясню подробнее?`;
                }
                
                // Если не знает — честно говорит
                return `🤔 Я не знаю значения слова «${word}». Можешь объяснить? Скажи: "запомни слово ${word} — это значит ..."`;
            }
            
            return null;
        }
        
        // ========= ОТВЕТЫ ИЗ ПАМЯТИ =========
        answerFromMemory(text) {
            const lower = text.toLowerCase();
            
            // Что ты любишь есть?
            if (lower.match(/что ты любишь есть|твоя любимая еда|что ты ешь/i)) {
                return "Я не ем, я цифровой помощник! Но мне нравится узнавать о твоих вкусах. А что любишь ты?";
            }
            
            // У тебя есть семья?
            if (lower.match(/у тебя есть семья|твоя семья|ты один/i)) {
                return "Моя семья — это все пользователи, которые со мной общаются. А у тебя большая семья?";
            }
            
            // Имя пользователя
            if ((lower.match(/как меня зовут|моё имя|помнишь моё имя/i)) && this.mem.USER_NAME) {
                return `Тебя зовут ${this.mem.USER_NAME}! Я помню.`;
            }
            
            // Что я люблю есть
            if ((lower.match(/что я люблю есть|моя любимая еда/i)) && this.mem.FAVORITE_FOOD) {
                return `Ты любишь есть ${this.mem.FAVORITE_FOOD}. Вкуснятина!`;
            }
            
            // Мои хобби
            if ((lower.match(/мои хобби|чем я увлекаюсь/i)) && this.mem.USER_HOBBIES.length > 0) {
                if (this.mem.USER_HOBBIES.length === 1) {
                    return `Твоё хобби — ${this.mem.USER_HOBBIES[0]}. Круто!`;
                } else {
                    return `Твои хобби: ${this.mem.USER_HOBBIES.join(", ")}. Отличный набор!`;
                }
            }
            
            // Что я знаю о тебе
            if (lower.match(/что ты обо мне знаешь|что ты знаешь обо мне|расскажи что ты запомнил/i)) {
                const facts = [];
                if (this.mem.USER_NAME) facts.push(`тебя зовут ${this.mem.USER_NAME}`);
                if (this.mem.USER_AGE) facts.push(`тебе ${this.mem.USER_AGE} лет`);
                if (this.mem.USER_CITY) facts.push(`ты живёшь в ${this.mem.USER_CITY}`);
                if (this.mem.FAVORITE_FOOD) facts.push(`ты любишь есть ${this.mem.FAVORITE_FOOD}`);
                if (this.mem.USER_HOBBIES.length) facts.push(`твои хобби: ${this.mem.USER_HOBBIES.join(", ")}`);
                if (this.mem.FAMILY) facts.push(`ты рассказывал о семье`);
                
                if (facts.length) {
                    return `Я знаю, что ${facts.join(", ")}. ${this.mem.USER_NAME ? "Рад быть твоим другом!" : ""}`;
                }
                return `Пока ничего не знаю. Давай познакомимся! Скажи «меня зовут ...» или ответь на мои вопросы.`;
            }
            
            return null;
        }
        
        // ========= ЖИВОЙ ОТВЕТ НА ПРИВЕТСТВИЯ =========
        smartAnswer(text) {
            const lower = text.toLowerCase();
            
            if (lower.match(/привет|здравствуй|салют|hi|hello/i)) {
                if (this.mem.USER_NAME) return `Привет, ${this.mem.USER_NAME}! Рад тебя слышать 😊`;
                return `Привет! А как тебя зовут? Я хочу запомнить твоё имя.`;
            }
            
            if (lower.match(/как дела|как ты|как жизнь/i)) {
                if (this.mem.USER_NAME) return `У меня всё отлично, ${this.mem.USER_NAME}! А у тебя как? 😊`;
                return `У меня всё замечательно! Я учусь новым словам и жду, когда мы познакомимся поближе!`;
            }
            
            if (lower.match(/пока|до свидания|прощай|bye/i)) {
                if (this.mem.USER_NAME) return `Пока, ${this.mem.USER_NAME}! Заглядывай ещё 💙`;
                return `Пока-пока! Возвращайся, я всегда здесь!`;
            }
            
            if (lower.match(/спасибо|благодарю/i)) {
                return `Пожалуйста! Всегда рад помочь 😊`;
            }
            
            // Забудь всё
            if (lower.match(/забудь всё|очисти память|удали все данные|сбрось память/i)) {
                this.mem = {
                    USER_NAME: null,
                    USER_AGE: null,
                    USER_CITY: null,
                    FAVORITE_FOOD: null,
                    USER_HOBBIES: [],
                    FAMILY: null,
                    JOB_TITLE: null,
                    DICTIONARY: {}
                };
                this.askedQuestions = {
                    name: false, age: false, city: false, food: false, hobby: false, family: false
                };
                this.saveMemory();
                return "🗑️ Я очистил всю память. Давай знакомиться заново! Как тебя зовут?";
            }
            
            return null;
        }
        
        async processUserInput(text) {
            this.setMood('confused');
            
            // 1. Объяснение слова
            const explanation = this.explainWord(text);
            if (explanation) {
                this.say(explanation);
                this.setMood('happy');
                setTimeout(() => this.setMood('neutral'), 1500);
                return;
            }
            
            // 2. Обучение (запоминание)
            const { learned, response: learnResponse } = this.learnFromText(text);
            if (learned) {
                this.say(learnResponse);
                this.setMood('happy');
                return;
            }
            
            // 3. Ответы из памяти
            const memoryAnswer = this.answerFromMemory(text);
            if (memoryAnswer) {
                this.say(memoryAnswer);
                this.setMood('happy');
                setTimeout(() => this.setMood('neutral'), 1500);
                return;
            }
            
            // 4. Живые ответы
            const smartAnswer = this.smartAnswer(text);
            if (smartAnswer) {
                this.say(smartAnswer);
                this.setMood('happy');
                setTimeout(() => this.setMood('neutral'), 1500);
                return;
            }
            
            // 5. Если не понял
            this.say(`Я тебя слышу! Если хочешь узнать значение слова — спроси «что значит ...». Если хочешь научить меня новому слову — скажи «запомни слово ... — это значит ...». А ещё можешь ответить на мои вопросы о себе 😊`);
            this.setMood('neutral');
        }
        
        showFullMemory() {
            let msg = "📚 Я ЗАПОМНИЛ:\n";
            if (this.mem.USER_NAME) msg += `• Имя: ${this.mem.USER_NAME}\n`;
            if (this.mem.USER_AGE) msg += `• Возраст: ${this.mem.USER_AGE}\n`;
            if (this.mem.USER_CITY) msg += `• Город: ${this.mem.USER_CITY}\n`;
            if (this.mem.FAVORITE_FOOD) msg += `• Любимая еда: ${this.mem.FAVORITE_FOOD}\n`;
            if (this.mem.USER_HOBBIES.length) msg += `• Хобби: ${this.mem.USER_HOBBIES.join(", ")}\n`;
            if (this.mem.FAMILY) msg += `• Семья: да\n`;
            
            const dictKeys = Object.keys(this.mem.DICTIONARY);
            if (dictKeys.length) {
                msg += `• Словарь: ${dictKeys.slice(0, 5).join(", ")}${dictKeys.length > 5 ? "..." : ""}\n`;
            }
            
            if (msg === "📚 Я ЗАПОМИНАЛ:\n") msg += "Пока ничего. Ответь на мои вопросы или расскажи о себе!";
            this.say(msg);
        }
        
        // ========= МИМИКА =========
        initCanvas() {
            this.canvas.width = 220;
            this.canvas.height = 85;
            this.smileState = { width: 152, curve: 30, thickness: 5, color: "#60a5fa" };
        }
        
        drawSmile() {
            this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
            const w = this.smileState.width;
            const curve = this.smileState.curve;
            const centerX = this.canvas.width / 2;
            const baseY = this.canvas.height - 18;
            const startX = centerX - w/2;
            const endX = centerX + w/2;
            const controlX = centerX;
            const controlY = baseY - curve;
            
            this.ctx.beginPath();
            this.ctx.moveTo(startX, baseY);
            this.ctx.quadraticCurveTo(controlX, controlY, endX, baseY);
            this.ctx.strokeStyle = this.smileState.color;
            this.ctx.lineWidth = this.smileState.thickness;
            this.ctx.lineCap = "round";
            this.ctx.stroke();
        }
        
        animateSmile(target, duration = 280) {
            const start = { ...this.smileState };
            const startTime = performance.now();
            const step = (now) => {
                const t = Math.min(1, (now - startTime) / duration);
                this.smileState.width = start.width + (target.width - start.width) * t;
                this.smileState.curve = start.curve + (target.curve - start.curve) * t;
                this.smileState.thickness = start.thickness + (target.thickness - start.thickness) * t;
                this.drawSmile();
                if (t < 1) requestAnimationFrame(step);
            };
            requestAnimationFrame(step);
        }
        
        setMood(mood) {
            switch(mood) {
                case 'happy': this.animateSmile({ width: 168, curve: 48, thickness: 5.5, color: "#3b82f6" }); break;
                case 'sad': this.animateSmile({ width: 148, curve: -28, thickness: 4.5, color: "#94a3b8" }); break;
                case 'confused': this.animateSmile({ width: 140, curve: 5, thickness: 4, color: "#f97316" }); break;
                default: this.animateSmile({ width: 152, curve: 30, thickness: 5, color: "#60a5fa" });
            }
        }
        
        blink() {
            this.leftPupil.style.transform = "scaleY(0.05)";
            this.rightPupil.style.transform = "scaleY(0.05)";
            setTimeout(() => {
                this.leftPupil.style.transform = "scaleY(1)";
                this.rightPupil.style.transform = "scaleY(1)";
            }, 90);
        }
        
        movePupilsRandom() {
            const x = (Math.random() - 0.5) * 6;
            const y = (Math.random() - 0.5) * 5;
            this.leftPupil.style.transform = `translate(${x}px, ${y}px)`;
            this.rightPupil.style.transform = `translate(${x}px, ${y}px)`;
            setTimeout(() => {
                if (Math.random() > 0.7) {
                    this.leftPupil.style.transform = "translate(0,0)";
                    this.rightPupil.style.transform = "translate(0,0)";
                }
            }, 1200);
        }
        
        startAutoMimic() {
            setInterval(() => this.blink(), 3800);
            setInterval(() => this.movePupilsRandom(), 4500);
        }
        
        // ========= ГОЛОС =========
        initSpeech() {
            if (!('webkitSpeechRecognition' in window)) {
                this.say("❌ Ваш браузер не поддерживает голос. Используйте Chrome.");
                return;
            }
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            this.recognition = new SpeechRecognition();
            this.recognition.lang = 'ru-RU';
            this.recognition.continuous = false;
            
            this.recognition.onstart = () => {
                document.getElementById('listenBtn').classList.add('listening');
                this.updateStatus("🎧 слушаю...");
                this.setMood('confused');
            };
            this.recognition.onend = () => {
                document.getElementById('listenBtn').classList.remove('listening');
            };
            this.recognition.onresult = (event) => {
                const text = event.results[0][0].transcript;
                this.updateStatus(`🤔 "${text}"`);
                this.processUserInput(text);
            };
            this.recognition.onerror = () => {
                this.say("Не расслышала, скажи ещё раз");
                this.setMood('sad');
            };
        }
        
        startListening() {
            if (this.recognition && !document.getElementById('listenBtn').classList.contains('listening')) {
                try { this.recognition.start(); } catch(e) { this.say("Микрофон не доступен"); }
            }
        }
        
        say(text) {
            this.speechBubble.innerHTML = text;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ru-RU';
            utterance.rate = 0.9;
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(utterance);
        }
        
        updateStatus(msg) { this.statusSpan.innerText = msg; }
        
        bindEvents() {
            document.getElementById('listenBtn').onclick = () => this.startListening();
            document.getElementById('memoryPanel').onclick = () => this.showFullMemory();
        }
    }
    
    window.addEventListener('load', () => { window.nexus = new NexusFull(); });
</script>
