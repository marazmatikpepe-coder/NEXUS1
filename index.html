<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NEXUS — память + живая улыбка</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Courier New', monospace;
            padding: 20px;
        }

        .nexus-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
            width: 100%;
            max-width: 550px;
        }

        .face {
            position: relative;
            width: 300px;
            height: 280px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: transparent;
        }

        .eyes {
            display: flex;
            gap: 60px;
            margin-bottom: 20px;
        }

        .eye {
            width: 60px;
            height: 60px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 10px rgba(59,130,246,0.5);
        }

        .pupil {
            width: 28px;
            height: 28px;
            background: #0f172a;
            border-radius: 50%;
            transition: all 0.1s ease;
            position: relative;
        }

        .pupil::after {
            content: "";
            position: absolute;
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            top: 5px;
            left: 5px;
        }

        canvas {
            display: block;
            margin-top: 5px;
            filter: drop-shadow(0 0 8px #3b82f6);
        }

        .button-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background: #1e293b;
            border: 2px solid #3b82f6;
            color: #3b82f6;
            padding: 12px 24px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
            font-family: monospace;
        }

        button:hover {
            background: #3b82f6;
            color: #0f172a;
            box-shadow: 0 0 15px #3b82f6;
            transform: scale(1.02);
        }

        .listen-btn {
            background: #3b82f6;
            color: white;
            box-shadow: 0 0 10px #3b82f6;
        }

        .listen-btn.listening {
            background: #ef4444;
            border-color: #ef4444;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(239,68,68,0.7); }
            70% { box-shadow: 0 0 0 15px rgba(239,68,68,0); }
            100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); }
        }

        .speech-bubble {
            background: rgba(30,41,59,0.95);
            backdrop-filter: blur(8px);
            border-radius: 30px;
            padding: 16px 20px;
            width: 100%;
            font-size: 1.2rem;
            color: #93c5fd;
            text-align: center;
            border: 1px solid #3b82f6;
            word-break: break-word;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: #0f172a;
            border: 2px solid #3b82f6;
            border-radius: 30px;
            padding: 20px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
            color: #93c5fd;
        }

        .modal-content h3 {
            margin-bottom: 15px;
            color: #3b82f6;
        }

        .memory-item {
            background: #1e293b;
            margin: 10px 0;
            padding: 10px;
            border-radius: 15px;
        }

        .memory-key {
            font-weight: bold;
            color: #60a5fa;
        }

        .memory-value {
            margin-top: 5px;
            word-break: break-word;
        }

        .memory-edit {
            margin-top: 8px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .memory-edit input {
            flex: 1;
            padding: 6px;
            border-radius: 20px;
            border: none;
            background: #334155;
            color: white;
        }

        .small-btn {
            padding: 4px 12px;
            font-size: 0.8rem;
            background: #334155;
        }

        .close-modal {
            background: #ef4444;
            border-color: #ef4444;
            color: white;
            margin-top: 15px;
        }

        .copy-all {
            background: #10b981;
            border-color: #10b981;
            color: white;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
<div class="nexus-container">
    <div class="face">
        <div class="eyes">
            <div class="eye"><div class="pupil" id="leftPupil"></div></div>
            <div class="eye"><div class="pupil" id="rightPupil"></div></div>
        </div>
        <canvas id="smileCanvas" width="200" height="80" style="width:200px; height:80px"></canvas>
    </div>

    <div class="speech-bubble" id="speechBubble">
        💙 Я NEXUS. Наполни меня знаниями через память
    </div>

    <div class="button-group">
        <button id="listenBtn" class="listen-btn">🎤 ГОВОРИТЬ</button>
        <button id="memoryBtn">📚 ПАМЯТЬ</button>
    </div>
</div>

<div id="memoryModal" class="modal">
    <div class="modal-content">
        <h3>📖 Память NEXUS</h3>
        <button id="copyAllMemory" class="copy-all small-btn">📋 Скопировать всё</button>
        <div id="memoryList"></div>
        <button id="closeModal" class="close-modal small-btn">Закрыть</button>
    </div>
</div>

<script>
    class Nexus {
        constructor() {
            this.canvas = document.getElementById('smileCanvas');
            this.ctx = this.canvas.getContext('2d');
            this.leftPupil = document.getElementById('leftPupil');
            this.rightPupil = document.getElementById('rightPupil');
            this.speechBubble = document.getElementById('speechBubble');
            
            // Улыбка рисуется ВВЕРХ (радостная)
            this.smileParams = {
                width: 140,
                curve: 38,     // положительный = улыбка вверх
                thickness: 5,
                color: '#3b82f6'
            };
            
            this.memory = this.loadMemory();
            this.initCanvas();
            this.initSpeech();
            this.startAutonomousLife();
            this.bindEvents();
            
            this.updateSpeech("💙 Скажи: «запомни, что я люблю кофе» — и я буду знать");
            this.drawSmile();
        }
        
        initCanvas() {
            this.canvas.width = 200;
            this.canvas.height = 80;
        }
        
        drawSmile() {
            this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
            
            const w = this.smileParams.width;
            const curve = this.smileParams.curve;
            const xCenter = this.canvas.width / 2;
            const yBase = this.canvas.height - 15;
            
            const startX = xCenter - w/2;
            const endX = xCenter + w/2;
            const controlX = xCenter;
            const controlY = yBase - curve;  // минус = вверх (улыбка)
            
            this.ctx.beginPath();
            this.ctx.moveTo(startX, yBase);
            this.ctx.quadraticCurveTo(controlX, controlY, endX, yBase);
            this.ctx.strokeStyle = this.smileParams.color;
            this.ctx.lineWidth = this.smileParams.thickness;
            this.ctx.lineCap = 'round';
            this.ctx.stroke();
            
            if (curve > 25) {
                this.ctx.beginPath();
                this.ctx.arc(xCenter - 25, yBase - curve + 8, 3, 0, Math.PI * 2);
                this.ctx.fillStyle = '#60a5fa';
                this.ctx.fill();
            }
        }
        
        animateSmile(targetParams, duration = 400) {
            const startParams = { ...this.smileParams };
            const startTime = performance.now();
            const animate = (now) => {
                const elapsed = now - startTime;
                const t = Math.min(1, elapsed / duration);
                this.smileParams.width = startParams.width + (targetParams.width - startParams.width) * t;
                this.smileParams.curve = startParams.curve + (targetParams.curve - startParams.curve) * t;
                this.smileParams.thickness = startParams.thickness + (targetParams.thickness - startParams.thickness) * t;
                this.drawSmile();
                if (t < 1) requestAnimationFrame(animate);
            };
            requestAnimationFrame(animate);
        }
        
        setMood(mood) {
            switch(mood) {
                case 'happy':
                    this.animateSmile({ width: 165, curve: 52, thickness: 6, color: '#60a5fa' }, 300);
                    break;
                case 'thinking':
                    this.animateSmile({ width: 130, curve: 20, thickness: 4, color: '#fbbf24' }, 400);
                    break;
                default:
                    this.animateSmile({ width: 145, curve: 38, thickness: 5, color: '#3b82f6' }, 300);
            }
        }
        
        startAutonomousLife() {
            setInterval(() => this.blink(), 4000);
            setInterval(() => {
                this.setMood('happy');
                setTimeout(() => this.setMood('neutral'), 1500);
            }, 8000);
        }
        
        blink() {
            this.leftPupil.style.transform = 'scaleY(0.05)';
            this.rightPupil.style.transform = 'scaleY(0.05)';
            setTimeout(() => {
                this.leftPupil.style.transform = 'scaleY(1)';
                this.rightPupil.style.transform = 'scaleY(1)';
            }, 100);
        }
        
        initSpeech() {
            if (!('webkitSpeechRecognition' in window)) {
                this.updateSpeech("❌ Голос не поддерживается, но память работает");
                return;
            }
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            this.recognition = new SpeechRecognition();
            this.recognition.lang = 'ru-RU';
            this.recognition.continuous = false;
            
            this.recognition.onstart = () => {
                document.getElementById('listenBtn').classList.add('listening');
                this.setMood('thinking');
                this.updateSpeech("🎧 слушаю...");
            };
            this.recognition.onend = () => {
                document.getElementById('listenBtn').classList.remove('listening');
            };
            this.recognition.onresult = (event) => {
                const text = event.results[0][0].transcript;
                this.processCommand(text);
            };
            this.recognition.onerror = () => {
                this.updateSpeech("👂 не расслышала, попробуй ещё");
                this.setMood('neutral');
            };
        }
        
        startListening() {
            if (this.recognition && !document.getElementById('listenBtn').classList.contains('listening')) {
                try {
                    this.recognition.start();
                } catch(e) {}
            }
        }
        
        // ========= ГЛАВНЫЙ МОЗГ: ЖИВЁТ ТОЛЬКО ИЗ ПАМЯТИ =========
        processCommand(text) {
            const lower = text.toLowerCase();
            
            // ЗАПОМНИТЬ: "запомни что-то"
            const rememberMatch = text.match(/запомни[: ]?\s*(.+)/i);
            if (rememberMatch) {
                const fact = rememberMatch[1].trim();
                const id = Date.now().toString();
                this.memory[id] = fact;
                this.saveMemory();
                this.updateSpeech(`✅ Запомнила: ${fact.substring(0, 80)}`);
                this.setMood('happy');
                setTimeout(() => this.setMood('neutral'), 1000);
                return;
            }
            
            // Если память пуста — просим наполнить
            if (Object.keys(this.memory).length === 0) {
                this.updateSpeech("📭 Моя память пуста. Скажи: «запомни, что я люблю собак» или открой «Память» и добавь факты");
                this.setMood('thinking');
                return;
            }
            
            // АНАЛИЗ: ищем в памяти всё, что связано с вопросом
            const allFacts = Object.values(this.memory);
            const relevantFacts = allFacts.filter(fact => 
                fact.toLowerCase().includes(lower) || 
                this.isRelated(lower, fact)
            );
            
            if (relevantFacts.length > 0) {
                let answer = "🔍 По моей памяти: ";
                answer += relevantFacts.slice(0, 3).join(". ");
                if (relevantFacts.length > 3) answer += " (и ещё кое-что)";
                this.updateSpeech(answer);
                this.setMood('happy');
            } else {
                this.updateSpeech(`🤔 В моей памяти нет ничего про «${text}». Скажи «запомни...» чтобы я узнал.`);
                this.setMood('thinking');
            }
            setTimeout(() => this.setMood('neutral'), 2000);
        }
        
        // Простой анализатор связей (можно расширять)
        isRelated(question, fact) {
            const keywords = question.split(/\s+/);
            for (let kw of keywords) {
                if (kw.length > 3 && fact.toLowerCase().includes(kw)) return true;
            }
            return false;
        }
        
        updateSpeech(text) {
            this.speechBubble.textContent = text;
        }
        
        loadMemory() {
            const saved = localStorage.getItem('nexus_memory_v2');
            return saved ? JSON.parse(saved) : {};
        }
        
        saveMemory() {
            localStorage.setItem('nexus_memory_v2', JSON.stringify(this.memory));
        }
        
        showMemoryModal() {
            const modal = document.getElementById('memoryModal');
            const container = document.getElementById('memoryList');
            container.innerHTML = '';
            
            if (Object.keys(this.memory).length === 0) {
                container.innerHTML = '<p>📭 Память пуста. Скажи: "запомни, что я люблю солнце"</p>';
            } else {
                for (const [id, fact] of Object.entries(this.memory)) {
                    const div = document.createElement('div');
                    div.className = 'memory-item';
                    div.innerHTML = `
                        <div class="memory-value">📌 ${fact}</div>
                        <div class="memory-edit">
                            <input type="text" placeholder="новый текст" id="edit-${id}">
                            <button class="small-btn save-edit" data-id="${id}">✏️</button>
                            <button class="small-btn delete-memory" data-id="${id}">🗑️</button>
                        </div>
                    `;
                    container.appendChild(div);
                }
            }
            
            modal.style.display = 'flex';
            
            document.querySelectorAll('.save-edit').forEach(btn => {
                btn.onclick = () => {
                    const id = btn.dataset.id;
                    const newVal = document.getElementById(`edit-${id}`).value;
                    if (newVal) {
                        this.memory[id] = newVal;
                        this.saveMemory();
                        this.showMemoryModal();
                        this.updateSpeech(`📝 Обновила факт`);
                    }
                };
            });
            
            document.querySelectorAll('.delete-memory').forEach(btn => {
                btn.onclick = () => {
                    const id = btn.dataset.id;
                    delete this.memory[id];
                    this.saveMemory();
                    this.showMemoryModal();
                    this.updateSpeech(`🗑️ Удалила из памяти`);
                };
            });
        }
        
        copyAllMemory() {
            let text = "ПАМЯТЬ NEXUS:\n";
            for (const fact of Object.values(this.memory)) {
                text += `• ${fact}\n`;
            }
            navigator.clipboard.writeText(text);
            this.updateSpeech("📋 Вся память скопирована!");
        }
        
        bindEvents() {
            document.getElementById('listenBtn').onclick = () => this.startListening();
            document.getElementById('memoryBtn').onclick = () => this.showMemoryModal();
            document.getElementById('closeModal').onclick = () => {
                document.getElementById('memoryModal').style.display = 'none';
            };
            document.getElementById('copyAllMemory').onclick = () => this.copyAllMemory();
            window.onclick = (e) => {
                if (e.target === document.getElementById('memoryModal')) {
                    document.getElementById('memoryModal').style.display = 'none';
                }
            };
        }
    }
    
    window.addEventListener('load', () => {
        window.nexus = new Nexus();
    });
</script>
</body>
</html>
