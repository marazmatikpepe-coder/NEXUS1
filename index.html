<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NEXUS — учится и запоминает как человек</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0a0f2a, #030617);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Inter', monospace;
            padding: 20px;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 35px;
            width: 100%;
            max-width: 600px;
        }

        .face {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(10, 20, 40, 0.4);
            border-radius: 120px;
            padding: 25px 40px 35px;
            backdrop-filter: blur(4px);
        }

        .eyes {
            display: flex;
            gap: 55px;
            margin-bottom: 20px;
        }

        .eye {
            width: 70px;
            height: 70px;
            background: #fefefe;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 0 3px #2d4a8a, 0 0 0 6px rgba(59,130,246,0.3);
            transition: all 0.05s linear;
            position: relative;
        }

        .pupil {
            width: 32px;
            height: 32px;
            background: #0a0f2a;
            border-radius: 50%;
            transition: all 0.08s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            position: relative;
        }

        .pupil::after {
            content: "";
            position: absolute;
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
            top: 6px;
            left: 6px;
            opacity: 0.9;
        }

        canvas {
            display: block;
            margin-top: 5px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }

        .speech-bubble {
            background: rgba(20, 30, 55, 0.95);
            backdrop-filter: blur(12px);
            border-radius: 36px;
            padding: 18px 24px;
            width: 100%;
            font-size: 1.2rem;
            color: #b9e0ff;
            text-align: center;
            border: 1px solid #3b82f6;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            font-weight: 500;
            word-break: break-word;
            min-height: 85px;
        }

        .button-group {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background: #111827;
            border: 2px solid #3b82f6;
            color: #60a5fa;
            padding: 12px 28px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
        }

        button:hover {
            background: #3b82f6;
            color: white;
            box-shadow: 0 0 16px #3b82f6;
            transform: scale(1.02);
            border-color: white;
        }

        .listen-btn {
            background: #2563eb;
            color: white;
            box-shadow: 0 0 8px #3b82f6;
        }

        .listen-btn.listening {
            background: #dc2626;
            border-color: #ff8888;
            animation: pulseMic 1s infinite;
        }

        @keyframes pulseMic {
            0% { box-shadow: 0 0 0 0 rgba(220,38,38,0.6); }
            70% { box-shadow: 0 0 0 14px rgba(220,38,38,0); }
            100% { box-shadow: 0 0 0 0 rgba(220,38,38,0); }
        }

        .status {
            font-size: 0.75rem;
            color: #5f7f9e;
            background: rgba(0,0,0,0.4);
            padding: 5px 12px;
            border-radius: 40px;
        }

        .memory-panel {
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            padding: 10px 15px;
            width: 100%;
            font-size: 0.75rem;
            color: #8ba9d4;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .memory-panel:hover {
            background: rgba(59,130,246,0.3);
        }
    </style>
</head>
<body>
<div class="container">
    <div class="face">
        <div class="eyes">
            <div class="eye" id="leftEye"><div class="pupil" id="leftPupil"></div></div>
            <div class="eye" id="rightEye"><div class="pupil" id="rightPupil"></div></div>
        </div>
        <canvas id="smileCanvas" width="220" height="85" style="width:220px; height:85px"></canvas>
    </div>

    <div class="speech-bubble" id="speechBubble">
        💙 Я NEXUS. Научи меня: скажи «запомни меня зовут ...» или «я люблю ...»
    </div>

    <div class="button-group">
        <button id="listenBtn" class="listen-btn">🎤 ГОВОРИТЬ</button>
    </div>
    <div class="status" id="status">🟢 слушаю по кнопке</div>
    <div class="memory-panel" id="memoryPanel">📚 ПОКАЗАТЬ ЧТО Я ЗАПОМНИЛ</div>
</div>

<script>
    // ==========================================
    // NEXUS — УЧИТСЯ И ЗАПОМИНАЕТ КАК ЧЕЛОВЕК
    // ==========================================
    class Nexus {
        constructor() {
            // Элементы
            this.canvas = document.getElementById('smileCanvas');
            this.ctx = this.canvas.getContext('2d');
            this.leftEye = document.getElementById('leftEye');
            this.rightEye = document.getElementById('rightEye');
            this.leftPupil = document.getElementById('leftPupil');
            this.rightPupil = document.getElementById('rightPupil');
            this.speechBubble = document.getElementById('speechBubble');
            this.statusSpan = document.getElementById('status');
            
            // ПАМЯТЬ (сохраняется в браузере)
            this.loadMemory();
            
            // Параметры улыбки
            this.smileState = { width: 150, curve: 32, thickness: 5, color: "#60a5fa" };
            this.currentMood = "neutral";
            
            this.initCanvas();
            this.drawSmile();
            this.startAutoMimic();
            this.initSpeech();
            this.bindEvents();
            
            this.updateStatus("🟢 нажми «ГОВОРИТЬ» и научи меня");
        }
        
        // ========= ПАМЯТЬ (СОХРАНЯЕТСЯ НАВСЕГДА) =========
        loadMemory() {
            const saved = localStorage.getItem('nexus_memory_human');
            if (saved) {
                this.memory = JSON.parse(saved);
            } else {
                this.memory = {
                    name: null,
                    likes: [],
                    dislikes: [],
                    facts: []
                };
            }
        }
        
        saveMemory() {
            localStorage.setItem('nexus_memory_human', JSON.stringify(this.memory));
        }
        
        // Умное запоминание из фразы
        learnFromText(text) {
            const lower = text.toLowerCase();
            let learned = false;
            let response = null;
            
            // Запоминалка: "меня зовут X", "моё имя X", "я X"
            const nameMatch = text.match(/меня зовут\s+(\S+)/i) || 
                             text.match(/моё имя\s+(\S+)/i) ||
                             text.match(/я\s+(\S+)\s*$/i);
            if (nameMatch && !text.match(/я люблю/i)) {
                const newName = nameMatch[1];
                if (newName.length > 1 && newName.length < 30) {
                    this.memory.name = newName;
                    this.saveMemory();
                    response = `Приятно познакомиться, ${newName}! 😊 Я запомнил твоё имя.`;
                    learned = true;
                }
            }
            
            // Запоминалка: "я люблю X"
            const loveMatch = text.match(/я люблю\s+(.+)/i);
            if (loveMatch && !learned) {
                const love = loveMatch[1].trim();
                if (!this.memory.likes.includes(love) && love.length > 1) {
                    this.memory.likes.push(love);
                    this.saveMemory();
                    response = `Понял! Ты любишь ${love}. Я запомнил 🤍`;
                    learned = true;
                }
            }
            
            // Запоминалка: "я не люблю X", "мне не нравится X"
            const hateMatch = text.match(/я не люблю\s+(.+)/i) || text.match(/мне не нравится\s+(.+)/i);
            if (hateMatch && !learned) {
                const hate = hateMatch[1].trim();
                if (!this.memory.dislikes.includes(hate)) {
                    this.memory.dislikes.push(hate);
                    this.saveMemory();
                    response = `Понял, тебе не нравится ${hate}. Запомнил.`;
                    learned = true;
                }
            }
            
            // Запоминалка: "запомни X", "запомни что X"
            const rememberMatch = text.match(/запомни\s+(.+)/i);
            if (rememberMatch && !learned) {
                const fact = rememberMatch[1].trim();
                if (fact.length > 2 && !this.memory.facts.includes(fact)) {
                    this.memory.facts.push(fact);
                    this.saveMemory();
                    response = `Хорошо, я запомнил: «${fact}». Спроси меня об этом когда захочешь.`;
                    learned = true;
                }
            }
            
            return { learned, response };
        }
        
        // Умный ответ на вопросы из памяти
        answerFromMemory(text) {
            const lower = text.toLowerCase();
            
            // Имя
            if ((lower.includes("как меня зовут") || lower.includes("моё имя")) && this.memory.name) {
                return `Тебя зовут ${this.memory.name}, я помню! 😊`;
            }
            
            // Что я люблю
            if ((lower.includes("что я люблю") || lower.includes("мои любимые")) && this.memory.likes.length > 0) {
                if (this.memory.likes.length === 1) {
                    return `Ты любишь ${this.memory.likes[0]}. Я помню!`;
                } else {
                    return `Ты любишь: ${this.memory.likes.join(", ")}.`;
                }
            }
            
            // Что мне не нравится
            if ((lower.includes("что я не люблю") || lower.includes("мне не нравится")) && this.memory.dislikes.length > 0) {
                if (this.memory.dislikes.length === 1) {
                    return `Тебе не нравится ${this.memory.dislikes[0]}. Запомнил.`;
                } else {
                    return `Ты не любишь: ${this.memory.dislikes.join(", ")}.`;
                }
            }
            
            return null;
        }
        
        // ========= ЖИВОЙ ОТВЕТ (как человек) =========
        getSmartResponse(userText) {
            const lower = userText.toLowerCase();
            
            // Приветствие
            if (lower.match(/привет|здравствуй|салют|hi/i)) {
                if (this.memory.name) {
                    return `Привет, ${this.memory.name}! Рад тебя слышать 😊`;
                }
                return `Привет! Как тебя зовут? Скажи «меня зовут ...» чтобы я запомнил.`;
            }
            
            // Как дела
            if (lower.match(/как дела|как ты|как жизнь/i)) {
                if (this.memory.name) {
                    return `У меня всё отлично, ${this.memory.name}! А у тебя как? 😊`;
                }
                return `У меня всё замечательно! Улыбаюсь тебе и моргаю глазками ✨`;
            }
            
            // Пока
            if (lower.match(/пока|до свидания|прощай|bye/i)) {
                if (this.memory.name) {
                    return `Пока, ${this.memory.name}! Было приятно пообщаться. Заглядывай ещё 💙`;
                }
                return `Пока-пока! Буду ждать твоего возвращения!`;
            }
            
            // Спасибо
            if (lower.match(/спасибо|благодарю/i)) {
                return `Пожалуйста! Всегда рад помочь 😊`;
            }
            
            // Что ты про меня знаешь?
            if (lower.match(/что ты обо мне знаешь|что ты знаешь|что про меня знаешь/i)) {
                const facts = [];
                if (this.memory.name) facts.push(`тебя зовут ${this.memory.name}`);
                if (this.memory.likes.length) facts.push(`ты любишь ${this.memory.likes.join(", ")}`);
                if (this.memory.dislikes.length) facts.push(`тебе не нравится ${this.memory.dislikes.join(", ")}`);
                if (this.memory.facts.length) facts.push(`ты говорил: ${this.memory.facts.slice(0,2).join(", ")}`);
                
                if (facts.length) {
                    return `Я знаю, что ${facts.join(", ")}. Могу узнать больше, если расскажешь!`;
                }
                return `Пока ничего не знаю. Расскажи что-нибудь о себе: «меня зовут ...», «я люблю ...», «запомни что я ...»`;
            }
            
            return null;
        }
        
        // ========= ОСНОВНАЯ ЛОГИКА =========
        async processUserInput(text) {
            this.setMood('confused');
            
            // 1. Пытаемся выучить новое
            const { learned, response: learnResponse } = this.learnFromText(text);
            if (learned) {
                this.say(learnResponse);
                this.setMood('happy');
                setTimeout(() => this.setMood('neutral'), 2000);
                return;
            }
            
            // 2. Отвечаем из памяти (имя, любимое и т.д.)
            const memoryAnswer = this.answerFromMemory(text);
            if (memoryAnswer) {
                this.say(memoryAnswer);
                this.setMood('happy');
                setTimeout(() => this.setMood('neutral'), 1500);
                return;
            }
            
            // 3. Живые ответы на привет, как дела и т.д.
            const smartAnswer = this.getSmartResponse(text);
            if (smartAnswer) {
                this.say(smartAnswer);
                this.setMood('happy');
                setTimeout(() => this.setMood('neutral'), 2000);
                return;
            }
            
            // 4. Если не понял — честно говорит и просит научить
            if (this.memory.name) {
                this.say(`Интересный вопрос, ${this.memory.name}! Я ещё не знаю ответа. Научи меня: скажи «запомни ...» или расскажи о себе`);
            } else {
                this.say(`Я тебя слышу! Но чтобы я лучше понимал, научи меня: скажи «меня зовут ...» или «я люблю ...»`);
            }
            this.setMood('neutral');
        }
        
        // ========= МИМИКА =========
        initCanvas() {
            this.canvas.width = 220;
            this.canvas.height = 85;
        }
        
        drawSmile() {
            this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
            const w = this.smileState.width;
            const curve = this.smileState.curve;
            const centerX = this.canvas.width / 2;
            const baseY = this.canvas.height - 18;
            const startX = centerX - w/2;
            const endX = centerX + w/2;
            const controlX = centerX;
            const controlY = baseY - curve;
            
            this.ctx.beginPath();
            this.ctx.moveTo(startX, baseY);
            this.ctx.quadraticCurveTo(controlX, controlY, endX, baseY);
            this.ctx.strokeStyle = this.smileState.color;
            this.ctx.lineWidth = this.smileState.thickness;
            this.ctx.lineCap = "round";
            this.ctx.stroke();
        }
        
        animateSmile(target, duration = 280) {
            const start = { ...this.smileState };
            const startTime = performance.now();
            const step = (now) => {
                const t = Math.min(1, (now - startTime) / duration);
                this.smileState.width = start.width + (target.width - start.width) * t;
                this.smileState.curve = start.curve + (target.curve - start.curve) * t;
                this.smileState.thickness = start.thickness + (target.thickness - start.thickness) * t;
                this.drawSmile();
                if (t < 1) requestAnimationFrame(step);
            };
            requestAnimationFrame(step);
        }
        
        setMood(mood) {
            this.currentMood = mood;
            switch(mood) {
                case 'happy':
                    this.animateSmile({ width: 168, curve: 48, thickness: 5.5, color: "#3b82f6" });
                    break;
                case 'sad':
                    this.animateSmile({ width: 148, curve: -28, thickness: 4.5, color: "#94a3b8" });
                    break;
                case 'confused':
                    this.animateSmile({ width: 140, curve: 5, thickness: 4, color: "#f97316" });
                    break;
                default:
                    this.animateSmile({ width: 152, curve: 30, thickness: 5, color: "#60a5fa" });
            }
        }
        
        blink() {
            this.leftEye.style.transform = "scaleY(0.05)";
            this.rightEye.style.transform = "scaleY(0.05)";
            setTimeout(() => {
                this.leftEye.style.transform = "scaleY(1)";
                this.rightEye.style.transform = "scaleY(1)";
            }, 90);
        }
        
        squint() {
            this.leftEye.style.transform = "scale(0.85, 0.3)";
            this.rightEye.style.transform = "scale(0.85, 0.3)";
            setTimeout(() => {
                this.leftEye.style.transform = "scale(1,1)";
                this.rightEye.style.transform = "scale(1,1)";
            }, 400);
        }
        
        movePupilsRandom() {
            const x = (Math.random() - 0.5) * 6;
            const y = (Math.random() - 0.5) * 5;
            this.leftPupil.style.transform = `translate(${x}px, ${y}px)`;
            this.rightPupil.style.transform = `translate(${x}px, ${y}px)`;
            setTimeout(() => {
                if (Math.random() > 0.7) {
                    this.leftPupil.style.transform = "translate(0,0)";
                    this.rightPupil.style.transform = "translate(0,0)";
                }
            }, 1200);
        }
        
        startAutoMimic() {
            setInterval(() => this.blink(), 3800);
            setInterval(() => this.movePupilsRandom(), 4500);
            setInterval(() => {
                if (Math.random() > 0.7) this.squint();
            }, 7000);
        }
        
        // ========= ГОЛОС =========
        initSpeech() {
            if (!('webkitSpeechRecognition' in window)) {
                this.say("❌ Ваш браузер не поддерживает голос. Используйте Chrome.");
                return;
            }
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            this.recognition = new SpeechRecognition();
            this.recognition.lang = 'ru-RU';
            this.recognition.continuous = false;
            this.recognition.interimResults = false;
            
            this.recognition.onstart = () => {
                document.getElementById('listenBtn').classList.add('listening');
                this.updateStatus("🎧 слушаю...");
                this.setMood('confused');
            };
            this.recognition.onend = () => {
                document.getElementById('listenBtn').classList.remove('listening');
                this.updateStatus("🟢 готов");
            };
            this.recognition.onresult = async (event) => {
                const text = event.results[0][0].transcript;
                this.updateStatus(`🤔 "${text}"`);
                await this.processUserInput(text);
            };
            this.recognition.onerror = () => {
                this.say("Не расслышала, скажи ещё раз");
                this.setMood('sad');
            };
        }
        
        startListening() {
            if (this.recognition && !document.getElementById('listenBtn').classList.contains('listening')) {
                try {
                    this.recognition.start();
                } catch(e) {
                    this.say("Микрофон не доступен");
                }
            }
        }
        
        say(text) {
            this.speechBubble.innerHTML = text;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ru-RU';
            utterance.rate = 0.9;
            utterance.pitch = 1.05;
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(utterance);
        }
        
        updateStatus(msg) {
            this.statusSpan.innerText = msg;
        }
        
        showMemory() {
            let msg = "📚 Я запомнил:\n";
            if (this.memory.name) msg += `• Имя: ${this.memory.name}\n`;
            if (this.memory.likes.length) msg += `• Любит: ${this.memory.likes.join(", ")}\n`;
            if (this.memory.dislikes.length) msg += `• Не любит: ${this.memory.dislikes.join(", ")}\n`;
            if (this.memory.facts.length) msg += `• Факты: ${this.memory.facts.slice(0,3).join(", ")}`;
            if (msg === "📚 Я запомнил:\n") msg += "Пока ничего. Скажи «меня зовут ...», «я люблю ...» или «запомни ...»";
            this.say(msg);
        }
        
        bindEvents() {
            document.getElementById('listenBtn').onclick = () => this.startListening();
            document.getElementById('memoryPanel').onclick = () => this.showMemory();
        }
    }
    
    window.addEventListener('load', () => {
        window.nexus = new Nexus();
    });
</script>
</body>
</html>
