<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NEXUS — живая улыбка с памятью</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Courier New', monospace;
            padding: 20px;
        }

        .nexus-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
            width: 100%;
            max-width: 550px;
        }

        /* Лицо с Canvas улыбкой */
        .face {
            position: relative;
            width: 300px;
            height: 280px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: transparent;
        }

        .eyes {
            display: flex;
            gap: 60px;
            margin-bottom: 20px;
        }

        .eye {
            width: 60px;
            height: 60px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 10px rgba(59,130,246,0.5);
        }

        .pupil {
            width: 28px;
            height: 28px;
            background: #0f172a;
            border-radius: 50%;
            transition: all 0.1s ease;
            position: relative;
        }

        .pupil::after {
            content: "";
            position: absolute;
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            top: 5px;
            left: 5px;
        }

        canvas {
            display: block;
            margin-top: 5px;
            filter: drop-shadow(0 0 8px #3b82f6);
        }

        /* Кнопки */
        .button-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background: #1e293b;
            border: 2px solid #3b82f6;
            color: #3b82f6;
            padding: 12px 24px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
            font-family: monospace;
        }

        button:hover {
            background: #3b82f6;
            color: #0f172a;
            box-shadow: 0 0 15px #3b82f6;
            transform: scale(1.02);
        }

        .listen-btn {
            background: #3b82f6;
            color: white;
            box-shadow: 0 0 10px #3b82f6;
        }

        .listen-btn.listening {
            background: #ef4444;
            border-color: #ef4444;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(239,68,68,0.7); }
            70% { box-shadow: 0 0 0 15px rgba(239,68,68,0); }
            100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); }
        }

        .speech-bubble {
            background: rgba(30,41,59,0.95);
            backdrop-filter: blur(8px);
            border-radius: 30px;
            padding: 16px 20px;
            width: 100%;
            font-size: 1.2rem;
            color: #93c5fd;
            text-align: center;
            border: 1px solid #3b82f6;
            word-break: break-word;
        }

        /* Модальное окно памяти */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: #0f172a;
            border: 2px solid #3b82f6;
            border-radius: 30px;
            padding: 20px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
            color: #93c5fd;
        }

        .modal-content h3 {
            margin-bottom: 15px;
            color: #3b82f6;
        }

        .memory-item {
            background: #1e293b;
            margin: 10px 0;
            padding: 10px;
            border-radius: 15px;
        }

        .memory-key {
            font-weight: bold;
            color: #60a5fa;
        }

        .memory-value {
            margin-top: 5px;
            word-break: break-word;
        }

        .memory-edit {
            margin-top: 8px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .memory-edit input {
            flex: 1;
            padding: 6px;
            border-radius: 20px;
            border: none;
            background: #334155;
            color: white;
        }

        .small-btn {
            padding: 4px 12px;
            font-size: 0.8rem;
            background: #334155;
        }

        .close-modal {
            background: #ef4444;
            border-color: #ef4444;
            color: white;
            margin-top: 15px;
        }

        .copy-all {
            background: #10b981;
            border-color: #10b981;
            color: white;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
<div class="nexus-container">
    <div class="face">
        <div class="eyes">
            <div class="eye"><div class="pupil" id="leftPupil"></div></div>
            <div class="eye"><div class="pupil" id="rightPupil"></div></div>
        </div>
        <canvas id="smileCanvas" width="200" height="80" style="width:200px; height:80px"></canvas>
    </div>

    <div class="speech-bubble" id="speechBubble">
        💙 Привет, я NEXUS с живой улыбкой
    </div>

    <div class="button-group">
        <button id="listenBtn" class="listen-btn">🎤 ГОВОРИТЬ</button>
        <button id="memoryBtn">📚 ПАМЯТЬ</button>
    </div>
</div>

<!-- Модальное окно памяти -->
<div id="memoryModal" class="modal">
    <div class="modal-content">
        <h3>📖 Память NEXUS</h3>
        <button id="copyAllMemory" class="copy-all small-btn">📋 Скопировать всё</button>
        <div id="memoryList"></div>
        <button id="closeModal" class="close-modal small-btn">Закрыть</button>
    </div>
</div>

<script>
    // =======================
    // NEXUS — ЖИВАЯ УЛЫБКА (CANVAS) + ПАМЯТЬ
    // =======================
    class Nexus {
        constructor() {
            this.canvas = document.getElementById('smileCanvas');
            this.ctx = this.canvas.getContext('2d');
            this.leftPupil = document.getElementById('leftPupil');
            this.rightPupil = document.getElementById('rightPupil');
            this.speechBubble = document.getElementById('speechBubble');
            
            // Параметры улыбки (меняются в реальном времени)
            this.smileParams = {
                width: 140,    // ширина улыбки
                curve: 35,     // изгиб (положительный = радость)
                thickness: 5,
                color: '#3b82f6'
            };
            
            // Память (загружаем из localStorage)
            this.memory = this.loadMemory();
            
            // Мимика
            this.currentMood = 'neutral';
            this.initCanvas();
            this.initSpeech();
            this.startAutonomousLife();
            this.bindEvents();
            
            this.updateSpeech("💙 Говори со мной, я запоминаю слова");
            this.drawSmile();
        }
        
        // ========= CANVAS УЛЫБКА (НЕ СТИКЕР) =========
        initCanvas() {
            this.canvas.width = 200;
            this.canvas.height = 80;
        }
        
        drawSmile() {
            this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
            
            const w = this.smileParams.width;
            const curve = this.smileParams.curve;
            const xCenter = this.canvas.width / 2;
            const yBase = this.canvas.height - 15;
            
            const startX = xCenter - w/2;
            const endX = xCenter + w/2;
            const controlX = xCenter;
            const controlY = yBase - curve;
            
            this.ctx.beginPath();
            this.ctx.moveTo(startX, yBase);
            this.ctx.quadraticCurveTo(controlX, controlY, endX, yBase);
            this.ctx.strokeStyle = this.smileParams.color;
            this.ctx.lineWidth = this.smileParams.thickness;
            this.ctx.lineCap = 'round';
            this.ctx.stroke();
            
            // Добавим блики для живости
            if (curve > 20) {
                this.ctx.beginPath();
                this.ctx.arc(xCenter - 25, yBase - curve + 8, 3, 0, Math.PI * 2);
                this.ctx.fillStyle = '#60a5fa';
                this.ctx.fill();
            }
        }
        
        // Анимированное изменение улыбки
        animateSmile(targetParams, duration = 400) {
            const startParams = { ...this.smileParams };
            const startTime = performance.now();
            
            const animate = (now) => {
                const elapsed = now - startTime;
                const t = Math.min(1, elapsed / duration);
                
                this.smileParams.width = startParams.width + (targetParams.width - startParams.width) * t;
                this.smileParams.curve = startParams.curve + (targetParams.curve - startParams.curve) * t;
                this.smileParams.thickness = startParams.thickness + (targetParams.thickness - startParams.thickness) * t;
                
                this.drawSmile();
                
                if (t < 1) requestAnimationFrame(animate);
            };
            
            requestAnimationFrame(animate);
        }
        
        // Смена настроения через улыбку
        setMood(mood) {
            this.currentMood = mood;
            switch(mood) {
                case 'happy':
                    this.animateSmile({ width: 160, curve: 48, thickness: 6, color: '#60a5fa' }, 300);
                    break;
                case 'sad':
                    this.animateSmile({ width: 130, curve: -20, thickness: 4, color: '#94a3b8' }, 300);
                    break;
                case 'thinking':
                    this.animateSmile({ width: 120, curve: 10, thickness: 4, color: '#fbbf24' }, 400);
                    break;
                case 'surprised':
                    this.animateSmile({ width: 170, curve: 55, thickness: 7, color: '#f97316' }, 250);
                    break;
                default:
                    this.animateSmile({ width: 140, curve: 32, thickness: 5, color: '#3b82f6' }, 300);
            }
            
            // Анимация зрачков
            if (mood === 'surprised') {
                this.leftPupil.style.transform = 'scale(0.7)';
                this.rightPupil.style.transform = 'scale(0.7)';
                setTimeout(() => {
                    this.leftPupil.style.transform = 'scale(1)';
                    this.rightPupil.style.transform = 'scale(1)';
                }, 500);
            }
        }
        
        // ========= АВТОНОМНАЯ ЖИЗНЬ =========
        startAutonomousLife() {
            setInterval(() => this.blink(), 4000);
            setInterval(() => {
                const moods = ['happy', 'thinking', 'happy'];
                const randomMood = moods[Math.floor(Math.random() * moods.length)];
                this.setMood(randomMood);
                setTimeout(() => this.setMood('neutral'), 1500);
            }, 9000);
        }
        
        blink() {
            this.leftPupil.style.transform = 'scaleY(0.1)';
            this.rightPupil.style.transform = 'scaleY(0.1)';
            setTimeout(() => {
                this.leftPupil.style.transform = 'scaleY(1)';
                this.rightPupil.style.transform = 'scaleY(1)';
            }, 100);
        }
        
        // ========= РАСПОЗНАВАНИЕ ГОЛОСА =========
        initSpeech() {
            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                this.updateSpeech("❌ Голос не поддерживается, но память работает");
                return;
            }
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            this.recognition = new SpeechRecognition();
            this.recognition.lang = 'ru-RU';
            this.recognition.continuous = false;
            this.recognition.interimResults = false;
            
            this.recognition.onstart = () => {
                document.getElementById('listenBtn').classList.add('listening');
                this.setMood('thinking');
                this.updateSpeech("🎧 слушаю... скажи что-нибудь");
            };
            
            this.recognition.onend = () => {
                document.getElementById('listenBtn').classList.remove('listening');
            };
            
            this.recognition.onresult = (event) => {
                const text = event.results[0][0].transcript;
                this.processCommand(text);
            };
            
            this.recognition.onerror = () => {
                this.updateSpeech("👂 не расслышала, попробуй ещё");
                this.setMood('sad');
                setTimeout(() => this.setMood('neutral'), 1000);
            };
        }
        
        startListening() {
            if (this.recognition && !document.getElementById('listenBtn').classList.contains('listening')) {
                try {
                    this.recognition.start();
                } catch(e) {}
            }
        }
        
        // ========= ОБРАБОТКА КОМАНД + ПАМЯТЬ =========
        processCommand(text) {
            const lower = text.toLowerCase();
            let response = "";
            
            // ЗАПОМНИ: слово — значение
            const rememberMatch = text.match(/запомни[: ]?\s*(\S+)\s*[-–—]\s*(.+)/i) ||
                                 text.match(/запомни[: ]?\s*(\S+)\s*это\s*(.+)/i);
            if (rememberMatch) {
                const key = rememberMatch[1].toLowerCase();
                const value = rememberMatch[2];
                this.memory[key] = value;
                this.saveMemory();
                response = `✅ Запомнила: ${key} — это ${value}`;
                this.setMood('happy');
                this.updateSpeech(response);
                return;
            }
            
            // ЧТО ЗНАЧИТ слово?
            const whatMatch = text.match(/что значит\s+(\S+)/i) ||
                             text.match(/кто такой\s+(\S+)/i) ||
                             text.match(/что такое\s+(\S+)/i);
            if (whatMatch) {
                const key = whatMatch[1].toLowerCase();
                if (this.memory[key]) {
                    response = `📖 ${key} — это ${this.memory[key]}`;
                    this.setMood('happy');
                } else {
                    response = `🤔 Я не знаю, что значит «${key}». Скажи «запомни ${key} — ...»`;
                    this.setMood('thinking');
                }
                this.updateSpeech(response);
                return;
            }
            
            // Обычные фразы
            if (lower.includes("привет")) {
                response = "Привет! Я с голубой улыбкой. Скажи «запомни ... — ...» чтобы научить меня";
                this.setMood('happy');
            } 
            else if (lower.includes("как дела")) {
                response = "Улыбаюсь и учусь новым словам! А у тебя?";
                this.setMood('happy');
            }
            else if (lower.includes("улыбнись")) {
                response = "😊 Смотри, моя улыбка стала шире!";
                this.setMood('happy');
                setTimeout(() => this.setMood('neutral'), 1500);
            }
            else if (lower.includes("пока")) {
                response = "Пока! Не забывай меня учить новым словам 💙";
                this.setMood('happy');
            }
            else {
                response = `💬 Ты сказал: «${text}». Чтобы я запомнила слово, скажи: "запомни котик — это пушистое животное"`;
                this.setMood('thinking');
                setTimeout(() => this.setMood('neutral'), 1200);
            }
            
            this.updateSpeech(response);
        }
        
        updateSpeech(text) {
            this.speechBubble.textContent = text;
        }
        
        // ========= РАБОТА С ПАМЯТЬЮ =========
        loadMemory() {
            const saved = localStorage.getItem('nexus_memory');
            return saved ? JSON.parse(saved) : {};
        }
        
        saveMemory() {
            localStorage.setItem('nexus_memory', JSON.stringify(this.memory));
        }
        
        showMemoryModal() {
            const modal = document.getElementById('memoryModal');
            const container = document.getElementById('memoryList');
            container.innerHTML = '';
            
            if (Object.keys(this.memory).length === 0) {
                container.innerHTML = '<p>📭 Память пуста. Скажи: "запомни солнце — это звезда"</p>';
            } else {
                for (const [key, value] of Object.entries(this.memory)) {
                    const div = document.createElement('div');
                    div.className = 'memory-item';
                    div.innerHTML = `
                        <div class="memory-key">📌 ${key}</div>
                        <div class="memory-value">${value}</div>
                        <div class="memory-edit">
                            <input type="text" placeholder="новое значение" id="edit-${key}">
                            <button class="small-btn save-edit" data-key="${key}">💾</button>
                            <button class="small-btn delete-memory" data-key="${key}">🗑️</button>
                        </div>
                    `;
                    container.appendChild(div);
                }
            }
            
            modal.style.display = 'flex';
            
            // Обработчики внутри модалки
            document.querySelectorAll('.save-edit').forEach(btn => {
                btn.onclick = () => {
                    const key = btn.dataset.key;
                    const newValue = document.getElementById(`edit-${key}`).value;
                    if (newValue) {
                        this.memory[key] = newValue;
                        this.saveMemory();
                        this.showMemoryModal(); // обновить
                        this.updateSpeech(`📝 Обновила: ${key} — ${newValue}`);
                    }
                };
            });
            
            document.querySelectorAll('.delete-memory').forEach(btn => {
                btn.onclick = () => {
                    const key = btn.dataset.key;
                    delete this.memory[key];
                    this.saveMemory();
                    this.showMemoryModal();
                    this.updateSpeech(`🗑️ Удалила «${key}» из памяти`);
                };
            });
        }
        
        copyAllMemory() {
            let text = "ПАМЯТЬ NEXUS:\n";
            for (const [key, value] of Object.entries(this.memory)) {
                text += `${key} → ${value}\n`;
            }
            navigator.clipboard.writeText(text);
            this.updateSpeech("📋 Вся память скопирована!");
        }
        
        bindEvents() {
            document.getElementById('listenBtn').onclick = () => this.startListening();
            document.getElementById('memoryBtn').onclick = () => this.showMemoryModal();
            document.getElementById('closeModal').onclick = () => {
                document.getElementById('memoryModal').style.display = 'none';
            };
            document.getElementById('copyAllMemory').onclick = () => this.copyAllMemory();
            window.onclick = (e) => {
                if (e.target === document.getElementById('memoryModal')) {
                    document.getElementById('memoryModal').style.display = 'none';
                }
            };
        }
    }
    
    window.addEventListener('load', () => {
        window.nexus = new Nexus();
    });
</script>
</body>
</html>
