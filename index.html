<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NEXUS — полная память (17 блоков)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            background: radial-gradient(circle at 20% 30%, #0a0f2a, #030617);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Inter', monospace;
            padding: 20px;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            width: 100%;
            max-width: 600px;
        }
        .face {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(10, 20, 40, 0.4);
            border-radius: 120px;
            padding: 25px 40px 35px;
            backdrop-filter: blur(4px);
        }
        .eyes { display: flex; gap: 55px; margin-bottom: 20px; }
        .eye {
            width: 70px; height: 70px; background: #fefefe; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 0 3px #2d4a8a, 0 0 0 6px rgba(59,130,246,0.3);
            transition: all 0.05s linear;
        }
        .pupil {
            width: 32px; height: 32px; background: #0a0f2a; border-radius: 50%;
            transition: all 0.08s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            position: relative;
        }
        .pupil::after {
            content: ""; position: absolute; width: 10px; height: 10px;
            background: white; border-radius: 50%; top: 6px; left: 6px; opacity: 0.9;
        }
        canvas { display: block; margin-top: 5px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3)); }
        .speech-bubble {
            background: rgba(20, 30, 55, 0.95); backdrop-filter: blur(12px);
            border-radius: 36px; padding: 18px 24px; width: 100%; font-size: 1.2rem;
            color: #b9e0ff; text-align: center; border: 1px solid #3b82f6;
            word-break: break-word; min-height: 85px;
        }
        .button-group {
            display: flex; gap: 15px; flex-wrap: wrap; justify-content: center;
        }
        button {
            background: #111827; border: 2px solid #3b82f6; color: #60a5fa;
            padding: 12px 20px; font-size: 1rem; font-weight: bold;
            border-radius: 60px; cursor: pointer; transition: 0.2s; font-family: inherit;
        }
        button:hover { background: #3b82f6; color: white; box-shadow: 0 0 16px #3b82f6; }
        .listen-btn { background: #2563eb; color: white; }
        .listen-btn.listening { background: #dc2626; animation: pulseMic 1s infinite; }
        @keyframes pulseMic {
            0% { box-shadow: 0 0 0 0 rgba(220,38,38,0.6); }
            70% { box-shadow: 0 0 0 14px rgba(220,38,38,0); }
            100% { box-shadow: 0 0 0 0 rgba(220,38,38,0); }
        }
        .status { font-size: 0.75rem; color: #5f7f9e; background: rgba(0,0,0,0.4); padding: 5px 12px; border-radius: 40px; }
        .memory-panel { background: rgba(0,0,0,0.5); border-radius: 20px; padding: 10px 15px; width: 100%; font-size: 0.75rem; color: #8ba9d4; text-align: center; cursor: pointer; }
        .memory-panel:hover { background: rgba(59,130,246,0.3); }
    </style>
</head>
<body>
<div class="container">
    <div class="face">
        <div class="eyes">
            <div class="eye"><div class="pupil" id="leftPupil"></div></div>
            <div class="eye"><div class="pupil" id="rightPupil"></div></div>
        </div>
        <canvas id="smileCanvas" width="220" height="85"></canvas>
    </div>
    <div class="speech-bubble" id="speechBubble">💙 Я NEXUS с полной памятью. Спрашивай что угодно!</div>
    <div class="button-group">
        <button id="listenBtn" class="listen-btn">🎤 ГОВОРИТЬ</button>
    </div>
    <div class="status" id="status">🟢 готов</div>
    <div class="memory-panel" id="memoryPanel">📚 ПОКАЗАТЬ ВСЮ ПАМЯТЬ</div>
</div>

<script>
    // ==================================================
    // NEXUS — ПОЛНАЯ БАЗА ЗНАНИЙ (17 БЛОКОВ)
    // Формат: ключевая_фраза -> переменная -> ответ
    // ==================================================
    class NexusFullMemory {
        constructor() {
            // Элементы
            this.canvas = document.getElementById('smileCanvas');
            this.ctx = this.canvas.getContext('2d');
            this.leftPupil = document.getElementById('leftPupil');
            this.rightPupil = document.getElementById('rightPupil');
            this.speechBubble = document.getElementById('speechBubble');
            this.statusSpan = document.getElementById('status');
            
            // ========== ПЕРЕМЕННЫЕ ПАМЯТИ (ВСЕ БЛОКИ) ==========
            this.mem = {
                // Блок 1: Имя
                BOT_NAME: "NEXUS",
                USER_NAME: null,
                
                // Блок 2: Возраст
                USER_AGE: null,
                
                // Блок 3: Город и страна
                USER_CITY: null,
                USER_COUNTRY: null,
                
                // Блок 4: Еда
                FAVORITE_FOOD: null,
                FAVORITE_DISH: null,
                FAVORITE_CUISINE: null,
                DIET_TYPE: null,
                
                // Блок 5: Хобби
                USER_HOBBIES: [],
                
                // Блок 6: Время (системное)
                
                // Блок 7: Работа
                JOB_TITLE: null,
                COMPANY_NAME: null,
                WORK_SCHEDULE: null,
                MONTHLY_INCOME: null,
                
                // Блок 8: Здоровье
                HEALTH_STATUS: null,
                TEMPERATURE: null,
                BLOOD_PRESSURE: null,
                HEART_RATE: null,
                
                // Блок 9: Семья
                RELATIONSHIP_STATUS: null,
                CHILDREN_COUNT: null,
                PETS: [],
                
                // Блок 10: Финансы
                CURRENT_BALANCE: null,
                MONTHLY_EXPENSES: null,
                DEBTS: null,
                
                // Блок 11: Техника
                PHONE_MODEL: null,
                COMPUTER_OS: null,
                COMPUTER_CPU: null,
                COMPUTER_RAM: null,
                
                // Блок 12: Образование
                USER_EDUCATION_LEVEL: null,
                USER_UNIVERSITY: null,
                USER_LANGUAGES: [],
                
                // Блок 13: Путешествия
                COUNTRIES_VISITED: [],
                FAVORITE_TRANSPORT: null,
                HAS_DRIVING_LICENSE: null,
                CAR_MODEL: null,
                
                // Блок 14: Развлечения
                FAVORITE_MOVIE_GENRE: null,
                FAVORITE_TV_SERIES: null,
                FAVORITE_GAME: null,
                FAVORITE_BOOK_AUTHOR: null,
                
                // Блок 15: Психология
                PERSONALITY_TYPE: null,
                STRENGTHS: null,
                WEAKNESSES: null,
                FEARS: null,
                VALUES: null,
                
                // Блок 16: Планы
                USER_GOALS: null,
                DREAM_JOB: null,
                BUCKET_LIST: [],
                
                // Блок 17: Системные (встроены в логику)
            };
            
            this.loadMemory();
            this.initCanvas();
            this.drawSmile();
            this.startAutoMimic();
            this.initSpeech();
            this.bindEvents();
            
            this.updateStatus("🟢 полная память загружена");
        }
        
        loadMemory() {
            const saved = localStorage.getItem('nexus_full_memory');
            if (saved) {
                const loaded = JSON.parse(saved);
                Object.assign(this.mem, loaded);
            }
        }
        
        saveMemory() {
            localStorage.setItem('nexus_full_memory', JSON.stringify(this.mem));
        }
        
        // ========= ОБУЧЕНИЕ: ЗАПОМИНАНИЕ ИЗ ФРАЗ =========
        learnFromText(text) {
            const lower = text.toLowerCase();
            let learned = false;
            let response = null;
            
            // Имя: "меня зовут X", "моё имя X", "я X"
            let nameMatch = text.match(/меня зовут\s+(\S+)/i) || text.match(/моё имя\s+(\S+)/i);
            if (nameMatch && !learned) {
                this.mem.USER_NAME = nameMatch[1];
                this.saveMemory();
                response = `Приятно познакомиться, ${this.mem.USER_NAME}! Я запомнил твоё имя.`;
                learned = true;
            }
            
            // Возраст: "мне X лет", "мой возраст X"
            let ageMatch = text.match(/мне\s+(\d+)\s*лет?/i) || text.match(/возраст\s+(\d+)/i);
            if (ageMatch && !learned) {
                this.mem.USER_AGE = ageMatch[1];
                this.saveMemory();
                response = `Запомнил: тебе ${this.mem.USER_AGE} лет.`;
                learned = true;
            }
            
            // Город: "я живу в X", "мой город X"
            let cityMatch = text.match(/я живу в\s+(\S+)/i) || text.match(/мой город\s+(\S+)/i);
            if (cityMatch && !learned) {
                this.mem.USER_CITY = cityMatch[1];
                this.saveMemory();
                response = `Понял, ты живёшь в ${this.mem.USER_CITY}.`;
                learned = true;
            }
            
            // Еда: "я люблю есть X", "моя любимая еда X"
            let foodMatch = text.match(/я люблю есть\s+(.+)/i) || text.match(/любимая еда\s+(.+)/i);
            if (foodMatch && !learned) {
                this.mem.FAVORITE_FOOD = foodMatch[1];
                this.saveMemory();
                response = `Запомнил: ты любишь есть ${this.mem.FAVORITE_FOOD}.`;
                learned = true;
            }
            
            // Хобби: "моё хобби X", "я увлекаюсь X"
            let hobbyMatch = text.match(/моё хобби\s+(.+)/i) || text.match(/я увлекаюсь\s+(.+)/i);
            if (hobbyMatch && !learned) {
                const hobby = hobbyMatch[1];
                if (!this.mem.USER_HOBBIES.includes(hobby)) {
                    this.mem.USER_HOBBIES.push(hobby);
                    this.saveMemory();
                    response = `Класс! ${hobby} — отличное хобби. Я запомнил.`;
                    learned = true;
                }
            }
            
            // Работа: "я работаю X", "моя профессия X"
            let jobMatch = text.match(/я работаю\s+(.+)/i) || text.match(/моя профессия\s+(.+)/i);
            if (jobMatch && !learned) {
                this.mem.JOB_TITLE = jobMatch[1];
                this.saveMemory();
                response = `Понял, ты работаешь ${this.mem.JOB_TITLE}.`;
                learned = true;
            }
            
            // Любое "запомни..."
            let rememberMatch = text.match(/запомни\s+(.+)/i);
            if (rememberMatch && !learned) {
                const fact = rememberMatch[1];
                if (!this.mem.USER_HOBBIES.includes(fact) && !this.mem.USER_NAME) {
                    this.mem.USER_HOBBIES.push(fact);
                    this.saveMemory();
                    response = `Хорошо, я запомнил: «${fact}».`;
                    learned = true;
                }
            }
            
            return { learned, response };
        }
        
        // ========= ОТВЕТЫ ИЗ ПАМЯТИ ПО ВСЕМ БЛОКАМ =========
        answerFromMemory(text) {
            const lower = text.toLowerCase();
            
            // Имя (500+ вариантов через синонимы)
            if (lower.match(/как тебя зовут|твоё имя|назови своё имя|представься|кто ты|твой никнейм|твой логин|как к тебе обращаться|твоё полное имя|имя бота|как тебя называть|твоё имя в системе/i)) {
                return `Меня зовут ${this.mem.BOT_NAME}. Я твой персональный ассистент с душой!`;
            }
            
            // Имя пользователя
            if (lower.match(/как меня зовут|моё имя|по какому имени я тебе известен|ты помнишь моё имя/i) && this.mem.USER_NAME) {
                return `Тебя зовут ${this.mem.USER_NAME}, я помню! 😊`;
            }
            
            // Возраст
            if (lower.match(/сколько тебе лет|твой возраст|какой у тебя возраст|сколько тебе было|сколько будет/i)) {
                return `Я цифровой ассистент, у меня нет возраста в человеческом понимании. Но я существую с момента твоего первого запуска!`;
            }
            if (lower.match(/сколько мне лет|мой возраст|сколько мне было/i) && this.mem.USER_AGE) {
                return `Твой возраст — ${this.mem.USER_AGE} лет. Я запомнил!`;
            }
            
            // Город и страна
            if (lower.match(/где ты живёшь|в каком городе|твой город|твоя страна|твоё местоположение/i)) {
                return `Я живу везде, где есть интернет! Но мой сервер думает, что его город — облака ☁️`;
            }
            if ((lower.match(/где я живу|мой город|моя страна|в каком городе я живу/i)) && this.mem.USER_CITY) {
                return `Ты живёшь в ${this.mem.USER_CITY}. Я запомнил твой город.`;
            }
            
            // Еда
            if ((lower.match(/что я люблю есть|моя любимая еда|любимое блюдо|что я ем/i)) && this.mem.FAVORITE_FOOD) {
                return `Ты любишь есть ${this.mem.FAVORITE_FOOD}. Вкусный выбор!`;
            }
            
            // Хобби
            if ((lower.match(/чем я увлекаюсь|мои хобби|мои интересы|что я делаю в свободное время/i)) && this.mem.USER_HOBBIES.length > 0) {
                if (this.mem.USER_HOBBIES.length === 1) {
                    return `Твоё хобби — ${this.mem.USER_HOBBIES[0]}. Здорово!`;
                } else {
                    return `Твои хобби: ${this.mem.USER_HOBBIES.join(", ")}. Отличный набор!`;
                }
            }
            
            // Работа
            if ((lower.match(/кем я работаю|моя профессия|моя должность|где я работаю/i)) && this.mem.JOB_TITLE) {
                return `Ты работаешь ${this.mem.JOB_TITLE}. Как тебе работа?`;
            }
            
            // Что я знаю о тебе
            if (lower.match(/что ты обо мне знаешь|что ты знаешь обо мне|покажи мои данные|моя карточка в твоей памяти/i)) {
                const facts = [];
                if (this.mem.USER_NAME) facts.push(`тебя зовут ${this.mem.USER_NAME}`);
                if (this.mem.USER_AGE) facts.push(`тебе ${this.mem.USER_AGE} лет`);
                if (this.mem.USER_CITY) facts.push(`ты живёшь в ${this.mem.USER_CITY}`);
                if (this.mem.FAVORITE_FOOD) facts.push(`ты любишь есть ${this.mem.FAVORITE_FOOD}`);
                if (this.mem.USER_HOBBIES.length) facts.push(`твои хобби: ${this.mem.USER_HOBBIES.join(", ")}`);
                if (this.mem.JOB_TITLE) facts.push(`ты работаешь ${this.mem.JOB_TITLE}`);
                
                if (facts.length) {
                    return `Я знаю, что ${facts.join(", ")}. Могу узнать больше, если расскажешь!`;
                }
                return `Пока ничего не знаю. Расскажи о себе: «меня зовут ...», «мне ... лет», «я живу в ...», «я люблю есть ...» или «моё хобби ...»`;
            }
            
            return null;
        }
        
        // ========= ЖИВОЙ ОТВЕТ НА ПРИВЕТСТВИЯ =========
        smartAnswer(text) {
            const lower = text.toLowerCase();
            
            if (lower.match(/привет|здравствуй|салют|hi|hello/i)) {
                if (this.mem.USER_NAME) return `Привет, ${this.mem.USER_NAME}! Рад тебя слышать 😊`;
                return `Привет! Как тебя зовут? Скажи «меня зовут ...» чтобы я запомнил.`;
            }
            
            if (lower.match(/как дела|как ты|как жизнь/i)) {
                if (this.mem.USER_NAME) return `У меня всё отлично, ${this.mem.USER_NAME}! А у тебя как? 😊`;
                return `У меня всё замечательно! Улыбаюсь тебе и моргаю глазками ✨`;
            }
            
            if (lower.match(/пока|до свидания|прощай|bye/i)) {
                if (this.mem.USER_NAME) return `Пока, ${this.mem.USER_NAME}! Заглядывай ещё 💙`;
                return `Пока-пока! Буду ждать твоего возвращения!`;
            }
            
            if (lower.match(/спасибо|благодарю/i)) {
                return `Пожалуйста! Всегда рад помочь 😊`;
            }
            
            // Забудь всё
            if (lower.match(/забудь всё|очисти память|удали все данные|сбрось память|factory reset/i)) {
                this.mem = {
                    BOT_NAME: "NEXUS",
                    USER_NAME: null,
                    USER_AGE: null,
                    USER_CITY: null,
                    USER_COUNTRY: null,
                    FAVORITE_FOOD: null,
                    FAVORITE_DISH: null,
                    FAVORITE_CUISINE: null,
                    DIET_TYPE: null,
                    USER_HOBBIES: [],
                    JOB_TITLE: null,
                    COMPANY_NAME: null,
                    WORK_SCHEDULE: null,
                    MONTHLY_INCOME: null,
                    HEALTH_STATUS: null,
                    TEMPERATURE: null,
                    BLOOD_PRESSURE: null,
                    HEART_RATE: null,
                    RELATIONSHIP_STATUS: null,
                    CHILDREN_COUNT: null,
                    PETS: [],
                    CURRENT_BALANCE: null,
                    MONTHLY_EXPENSES: null,
                    DEBTS: null,
                    PHONE_MODEL: null,
                    COMPUTER_OS: null,
                    COMPUTER_CPU: null,
                    COMPUTER_RAM: null,
                    USER_EDUCATION_LEVEL: null,
                    USER_UNIVERSITY: null,
                    USER_LANGUAGES: [],
                    COUNTRIES_VISITED: [],
                    FAVORITE_TRANSPORT: null,
                    HAS_DRIVING_LICENSE: null,
                    CAR_MODEL: null,
                    FAVORITE_MOVIE_GENRE: null,
                    FAVORITE_TV_SERIES: null,
                    FAVORITE_GAME: null,
                    FAVORITE_BOOK_AUTHOR: null,
                    PERSONALITY_TYPE: null,
                    STRENGTHS: null,
                    WEAKNESSES: null,
                    FEARS: null,
                    VALUES: null,
                    USER_GOALS: null,
                    DREAM_JOB: null,
                    BUCKET_LIST: [],
                };
                this.saveMemory();
                return "🗑️ Я очистил всю память о тебе. Можем начать заново.";
            }
            
            return null;
        }
        
        async processUserInput(text) {
            this.setMood('confused');
            
            // 1. Пытаемся выучить новое
            const { learned, response: learnResponse } = this.learnFromText(text);
            if (learned) {
                this.say(learnResponse);
                this.setMood('happy');
                setTimeout(() => this.setMood('neutral'), 2000);
                return;
            }
            
            // 2. Отвечаем из памяти по всем блокам
            const memoryAnswer = this.answerFromMemory(text);
            if (memoryAnswer) {
                this.say(memoryAnswer);
                this.setMood('happy');
                setTimeout(() => this.setMood('neutral'), 1500);
                return;
            }
            
            // 3. Живые ответы на привет, пока, спасибо, забыть
            const smartAnswer = this.smartAnswer(text);
            if (smartAnswer) {
                this.say(smartAnswer);
                this.setMood('happy');
                setTimeout(() => this.setMood('neutral'), 2000);
                return;
            }
            
            // 4. Если не понял
            if (this.mem.USER_NAME) {
                this.say(`Интересный вопрос, ${this.mem.USER_NAME}! Чтобы я лучше тебя понимал, расскажи о себе: «меня зовут ...», «моё хобби ...» или «я люблю есть ...»`);
            } else {
                this.say(`Я тебя слышу! Чтобы мы подружились, расскажи о себе: как тебя зовут, где ты живёшь, чем увлекаешься. А я всё запомню!`);
            }
            this.setMood('neutral');
        }
        
        showFullMemory() {
            let msg = "📚 Я ЗАПОМНИЛ О ТЕБЕ:\n";
            if (this.mem.USER_NAME) msg += `• Имя: ${this.mem.USER_NAME}\n`;
            if (this.mem.USER_AGE) msg += `• Возраст: ${this.mem.USER_AGE}\n`;
            if (this.mem.USER_CITY) msg += `• Город: ${this.mem.USER_CITY}\n`;
            if (this.mem.FAVORITE_FOOD) msg += `• Любимая еда: ${this.mem.FAVORITE_FOOD}\n`;
            if (this.mem.USER_HOBBIES.length) msg += `• Хобби: ${this.mem.USER_HOBBIES.join(", ")}\n`;
            if (this.mem.JOB_TITLE) msg += `• Работа: ${this.mem.JOB_TITLE}\n`;
            if (msg === "📚 Я ЗАПОМИНАЛ О ТЕБЕ:\n") msg += "Пока ничего. Расскажи что-нибудь о себе!";
            this.say(msg);
        }
        
        // ========= МИМИКА =========
        initCanvas() {
            this.canvas.width = 220;
            this.canvas.height = 85;
        }
        
        drawSmile() {
            this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
            const w = this.smileState?.width || 152;
            const curve = this.smileState?.curve || 30;
            const centerX = this.canvas.width / 2;
            const baseY = this.canvas.height - 18;
            const startX = centerX - w/2;
            const endX = centerX + w/2;
            const controlX = centerX;
            const controlY = baseY - curve;
            
            this.ctx.beginPath();
            this.ctx.moveTo(startX, baseY);
            this.ctx.quadraticCurveTo(controlX, controlY, endX, baseY);
            this.ctx.strokeStyle = this.smileState?.color || "#60a5fa";
            this.ctx.lineWidth = this.smileState?.thickness || 5;
            this.ctx.lineCap = "round";
            this.ctx.stroke();
        }
        
        animateSmile(target, duration = 280) {
            if (!this.smileState) {
                this.smileState = { width: 152, curve: 30, thickness: 5, color: "#60a5fa" };
            }
            const start = { ...this.smileState };
            const startTime = performance.now();
            const step = (now) => {
                const t = Math.min(1, (now - startTime) / duration);
                this.smileState.width = start.width + (target.width - start.width) * t;
                this.smileState.curve = start.curve + (target.curve - start.curve) * t;
                this.smileState.thickness = start.thickness + (target.thickness - start.thickness) * t;
                this.drawSmile();
                if (t < 1) requestAnimationFrame(step);
            };
            requestAnimationFrame(step);
        }
        
        setMood(mood) {
            if (!this.smileState) {
                this.smileState = { width: 152, curve: 30, thickness: 5, color: "#60a5fa" };
            }
            switch(mood) {
                case 'happy': this.animateSmile({ width: 168, curve: 48, thickness: 5.5, color: "#3b82f6" }); break;
                case 'sad': this.animateSmile({ width: 148, curve: -28, thickness: 4.5, color: "#94a3b8" }); break;
                case 'confused': this.animateSmile({ width: 140, curve: 5, thickness: 4, color: "#f97316" }); break;
                default: this.animateSmile({ width: 152, curve: 30, thickness: 5, color: "#60a5fa" });
            }
        }
        
        blink() {
            this.leftPupil.style.transform = "scaleY(0.05)";
            this.rightPupil.style.transform = "scaleY(0.05)";
            setTimeout(() => {
                this.leftPupil.style.transform = "scaleY(1)";
                this.rightPupil.style.transform = "scaleY(1)";
            }, 90);
        }
        
        movePupilsRandom() {
            const x = (Math.random() - 0.5) * 6;
            const y = (Math.random() - 0.5) * 5;
            this.leftPupil.style.transform = `translate(${x}px, ${y}px)`;
            this.rightPupil.style.transform = `translate(${x}px, ${y}px)`;
            setTimeout(() => {
                if (Math.random() > 0.7) {
                    this.leftPupil.style.transform = "translate(0,0)";
                    this.rightPupil.style.transform = "translate(0,0)";
                }
            }, 1200);
        }
        
        startAutoMimic() {
            this.smileState = { width: 152, curve: 30, thickness: 5, color: "#60a5fa" };
            setInterval(() => this.blink(), 3800);
            setInterval(() => this.movePupilsRandom(), 4500);
        }
        
        // ========= ГОЛОС =========
        initSpeech() {
            if (!('webkitSpeechRecognition' in window)) {
                this.say("❌ Ваш браузер не поддерживает голос. Используйте Chrome.");
                return;
            }
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            this.recognition = new SpeechRecognition();
            this.recognition.lang = 'ru-RU';
            this.recognition.continuous = false;
            
            this.recognition.onstart = () => {
                document.getElementById('listenBtn').classList.add('listening');
                this.updateStatus("🎧 слушаю...");
                this.setMood('confused');
            };
            this.recognition.onend = () => {
                document.getElementById('listenBtn').classList.remove('listening');
            };
            this.recognition.onresult = (event) => {
                const text = event.results[0][0].transcript;
                this.updateStatus(`🤔 "${text}"`);
                this.processUserInput(text);
            };
            this.recognition.onerror = () => {
                this.say("Не расслышала, скажи ещё раз");
                this.setMood('sad');
            };
        }
        
        startListening() {
            if (this.recognition && !document.getElementById('listenBtn').classList.contains('listening')) {
                try { this.recognition.start(); } catch(e) { this.say("Микрофон не доступен"); }
            }
        }
        
        say(text) {
            this.speechBubble.innerHTML = text;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ru-RU';
            utterance.rate = 0.9;
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(utterance);
        }
        
        updateStatus(msg) { this.statusSpan.innerText = msg; }
        
        bindEvents() {
            document.getElementById('listenBtn').onclick = () => this.startListening();
            document.getElementById('memoryPanel').onclick = () => this.showFullMemory();
        }
    }
    
    window.addEventListener('load', () => { window.nexus = new NexusFullMemory(); });
</script>
</body>
