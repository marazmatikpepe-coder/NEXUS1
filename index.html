<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NEXUS — ИИ с душой</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0a0f2a, #030617);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Inter', system-ui, monospace;
            padding: 20px;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 35px;
            width: 100%;
            max-width: 600px;
        }

        .face {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(10, 20, 40, 0.4);
            border-radius: 120px;
            padding: 25px 40px 35px;
            backdrop-filter: blur(4px);
        }

        .eyes {
            display: flex;
            gap: 55px;
            margin-bottom: 20px;
        }

        .eye {
            width: 70px;
            height: 70px;
            background: #fefefe;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 0 3px #2d4a8a, 0 0 0 6px rgba(59,130,246,0.3);
            transition: all 0.05s linear;
            position: relative;
        }

        .pupil {
            width: 32px;
            height: 32px;
            background: #0a0f2a;
            border-radius: 50%;
            transition: all 0.08s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            position: relative;
        }

        .pupil::after {
            content: "";
            position: absolute;
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
            top: 6px;
            left: 6px;
            opacity: 0.9;
        }

        canvas {
            display: block;
            margin-top: 5px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }

        .speech-bubble {
            background: rgba(20, 30, 55, 0.95);
            backdrop-filter: blur(12px);
            border-radius: 36px;
            padding: 18px 24px;
            width: 100%;
            font-size: 1.2rem;
            color: #b9e0ff;
            text-align: center;
            border: 1px solid #3b82f6;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            font-weight: 500;
            word-break: break-word;
            min-height: 85px;
        }

        .button-group {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background: #111827;
            border: 2px solid #3b82f6;
            color: #60a5fa;
            padding: 12px 28px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
        }

        button:hover {
            background: #3b82f6;
            color: white;
            box-shadow: 0 0 16px #3b82f6;
            transform: scale(1.02);
            border-color: white;
        }

        .listen-btn {
            background: #2563eb;
            color: white;
            box-shadow: 0 0 8px #3b82f6;
        }

        .listen-btn.listening {
            background: #dc2626;
            border-color: #ff8888;
            animation: pulseMic 1s infinite;
        }

        @keyframes pulseMic {
            0% { box-shadow: 0 0 0 0 rgba(220,38,38,0.6); }
            70% { box-shadow: 0 0 0 14px rgba(220,38,38,0); }
            100% { box-shadow: 0 0 0 0 rgba(220,38,38,0); }
        }

        .status {
            font-size: 0.75rem;
            color: #5f7f9e;
            background: rgba(0,0,0,0.4);
            padding: 5px 12px;
            border-radius: 40px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="face">
        <div class="eyes">
            <div class="eye" id="leftEye"><div class="pupil" id="leftPupil"></div></div>
            <div class="eye" id="rightEye"><div class="pupil" id="rightPupil"></div></div>
        </div>
        <canvas id="smileCanvas" width="220" height="85" style="width:220px; height:85px"></canvas>
    </div>

    <div class="speech-bubble" id="speechBubble">
        💙 Я NEXUS с ИИ-мозгом. Говори со мной
    </div>

    <div class="button-group">
        <button id="listenBtn" class="listen-btn">🎤 ГОВОРИТЬ</button>
    </div>
    <div class="status" id="status">🔵 готов</div>
</div>

<script>
    // =======================
    // NEXUS — с DeepSeek API + живая мимика
    // =======================
    class Nexus {
        constructor() {
            // КЛЮЧ DeepSeek (твой)
            this.apiKey = "sk-209473eaccec47febeb7ee7e1e5db676";
            this.apiUrl = "https://api.deepseek.com/v1/chat/completions";
            
            // История диалога (память разговора)
            this.conversationHistory = [
                { role: "system", content: "Ты NEXUS — живой, эмоциональный ассистент с душой. У тебя есть улыбка, глаза. Ты можешь радоваться, грустить, удивляться. Отвечай коротко, но тепло и осмысленно. Используй до 2-3 предложений." }
            ];
            
            // Элементы
            this.canvas = document.getElementById('smileCanvas');
            this.ctx = this.canvas.getContext('2d');
            this.leftEye = document.getElementById('leftEye');
            this.rightEye = document.getElementById('rightEye');
            this.leftPupil = document.getElementById('leftPupil');
            this.rightPupil = document.getElementById('rightPupil');
            this.speechBubble = document.getElementById('speechBubble');
            this.statusSpan = document.getElementById('status');
            
            // Параметры улыбки
            this.smileState = { width: 150, curve: 32, thickness: 5, color: "#60a5fa" };
            this.currentMood = "neutral";
            
            this.initCanvas();
            this.initSpeech();
            this.startAutoMimic();
            this.bindEvents();
            this.drawSmile();
            this.updateStatus("🔵 слушаю по кнопке");
        }
        
        initCanvas() {
            this.canvas.width = 220;
            this.canvas.height = 85;
        }
        
        // ========= РИСОВАНИЕ УЛЫБКИ (вверх, вниз, плоская) =========
        drawSmile() {
            this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
            const w = this.smileState.width;
            const curve = this.smileState.curve; // положительная = вверх, отрицательная = вниз
            const centerX = this.canvas.width / 2;
            const baseY = this.canvas.height - 18;
            
            const startX = centerX - w/2;
            const endX = centerX + w/2;
            const controlX = centerX;
            const controlY = baseY - curve;
            
            this.ctx.beginPath();
            this.ctx.moveTo(startX, baseY);
            this.ctx.quadraticCurveTo(controlX, controlY, endX, baseY);
            this.ctx.strokeStyle = this.smileState.color;
            this.ctx.lineWidth = this.smileState.thickness;
            this.ctx.lineCap = "round";
            this.ctx.stroke();
        }
        
        animateSmile(target, duration = 280) {
            const start = { ...this.smileState };
            const startTime = performance.now();
            const step = (now) => {
                const t = Math.min(1, (now - startTime) / duration);
                this.smileState.width = start.width + (target.width - start.width) * t;
                this.smileState.curve = start.curve + (target.curve - start.curve) * t;
                this.smileState.thickness = start.thickness + (target.thickness - start.thickness) * t;
                this.drawSmile();
                if (t < 1) requestAnimationFrame(step);
            };
            requestAnimationFrame(step);
        }
        
        setMood(mood) {
            this.currentMood = mood;
            switch(mood) {
                case 'happy':
                    this.animateSmile({ width: 168, curve: 48, thickness: 5.5, color: "#3b82f6" });
                    break;
                case 'sad':
                    this.animateSmile({ width: 148, curve: -28, thickness: 4.5, color: "#94a3b8" });
                    break;
                case 'confused':
                    this.animateSmile({ width: 140, curve: 5, thickness: 4, color: "#f97316" });
                    break;
                default:
                    this.animateSmile({ width: 152, curve: 30, thickness: 5, color: "#60a5fa" });
            }
        }
        
        // ========= ГЛАЗА: моргание, прищур, движение =========
        blink() {
            this.leftEye.style.transform = "scaleY(0.05)";
            this.rightEye.style.transform = "scaleY(0.05)";
            setTimeout(() => {
                this.leftEye.style.transform = "scaleY(1)";
                this.rightEye.style.transform = "scaleY(1)";
            }, 90);
        }
        
        squint() {
            this.leftEye.style.transform = "scale(0.85, 0.3)";
            this.rightEye.style.transform = "scale(0.85, 0.3)";
            setTimeout(() => {
                this.leftEye.style.transform = "scale(1,1)";
                this.rightEye.style.transform = "scale(1,1)";
            }, 400);
        }
        
        rollEyes() {
            this.leftPupil.style.transform = "translate(8px, -4px)";
            this.rightPupil.style.transform = "translate(8px, -4px)";
            setTimeout(() => {
                this.leftPupil.style.transform = "translate(0,0)";
                this.rightPupil.style.transform = "translate(0,0)";
            }, 500);
        }
        
        movePupilsRandom() {
            const x = (Math.random() - 0.5) * 6;
            const y = (Math.random() - 0.5) * 5;
            this.leftPupil.style.transform = `translate(${x}px, ${y}px)`;
            this.rightPupil.style.transform = `translate(${x}px, ${y}px)`;
            setTimeout(() => {
                if (Math.random() > 0.7) {
                    this.leftPupil.style.transform = "translate(0,0)";
                    this.rightPupil.style.transform = "translate(0,0)";
                }
            }, 1200);
        }
        
        startAutoMimic() {
            setInterval(() => this.blink(), 3800);
            setInterval(() => this.movePupilsRandom(), 4200);
            // Иногда щурится
            setInterval(() => {
                if (Math.random() > 0.7) this.squint();
            }, 7000);
        }
        
        // ========= ГОЛОСОВОЙ ВВОД =========
        initSpeech() {
            if (!('webkitSpeechRecognition' in window)) {
                this.say("❌ Ваш браузер не поддерживает голос. Используйте Chrome.");
                return;
            }
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            this.recognition = new SpeechRecognition();
            this.recognition.lang = 'ru-RU';
            this.recognition.continuous = false;
            this.recognition.interimResults = false;
            
            this.recognition.onstart = () => {
                document.getElementById('listenBtn').classList.add('listening');
                this.updateStatus("🎧 слушаю...");
                this.setMood('confused');
                this.sayRaw("Слушаю...");
            };
            this.recognition.onend = () => {
                document.getElementById('listenBtn').classList.remove('listening');
                this.updateStatus("🔵 обрабатываю");
            };
            this.recognition.onresult = async (event) => {
                const text = event.results[0][0].transcript;
                this.updateStatus(`🤔 думаю...`);
                this.setMood('confused');
                await this.askDeepSeek(text);
            };
            this.recognition.onerror = () => {
                this.say("Не расслышала, скажи еще раз");
                this.setMood('sad');
                this.updateStatus("🔴 ошибка, попробуй снова");
                setTimeout(() => this.setMood('neutral'), 1200);
            };
        }
        
        startListening() {
            if (this.recognition && !document.getElementById('listenBtn').classList.contains('listening')) {
                try { this.recognition.start(); } catch(e) { this.say("Микрофон не доступен"); }
            }
        }
        
        // ========= DEEPSEEK API (ИИ-МОЗГ) =========
        async askDeepSeek(userText) {
            this.conversationHistory.push({ role: "user", content: userText });
            
            const requestBody = {
                model: "deepseek-chat",
                messages: this.conversationHistory,
                temperature: 0.85,
                max_tokens: 300
            };
            
            try {
                const response = await fetch(this.apiUrl, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${this.apiKey}`
                    },
                    body: JSON.stringify(requestBody)
                });
                
                if (!response.ok) throw new Error(`API error ${response.status}`);
                const data = await response.json();
                const reply = data.choices[0].message.content;
                
                // Сохраняем в историю
                this.conversationHistory.push({ role: "assistant", content: reply });
                if (this.conversationHistory.length > 12) {
                    this.conversationHistory = [this.conversationHistory[0], ...this.conversationHistory.slice(-10)];
                }
                
                // Анализируем эмоцию из ответа или текста пользователя
                this.reactToMessage(userText, reply);
                this.say(reply);
                this.updateStatus("💬 ответил");
            } catch (err) {
                console.error(err);
                this.say("Ошибка соединения с ИИ, но я рядом");
                this.setMood('sad');
                this.updateStatus("⚠️ API ошибка");
            }
        }
        
        // Живая реакция на смысл
        reactToMessage(userText, aiReply) {
            const lower = (userText + " " + aiReply).toLowerCase();
            if (lower.includes("люблю") || lower.includes("красив") || lower.includes("рад")) {
                this.setMood('happy');
                this.rollEyes(); // довольный закат глаз
            } else if (lower.includes("груст") || lower.includes("плох") || lower.includes("обидно")) {
                this.setMood('sad');
                this.squint();
            } else if (lower.includes("?") || lower.includes("что") || lower.includes("как")) {
                this.setMood('confused');
                this.movePupilsRandom();
            } else {
                this.setMood('neutral');
            }
            setTimeout(() => this.setMood('neutral'), 2000);
        }
        
        // ========= ГОЛОСОВОЙ ВЫВОД (ДИКТОР) =========
        say(text) {
            this.sayRaw(text);
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ru-RU';
            utterance.rate = 0.95;
            utterance.pitch = 1.05;
            utterance.volume = 1;
            window.speechSynthesis.cancel(); // избежать наслоения
            window.speechSynthesis.speak(utterance);
        }
        
        sayRaw(text) {
            this.speechBubble.innerHTML = text.replace(/\\n/g, '<br>');
        }
        
        updateStatus(msg) {
            this.statusSpan.innerText = msg;
        }
        
        bindEvents() {
            document.getElementById('listenBtn').onclick = () => this.startListening();
        }
    }
    
    window.addEventListener('load', () => {
        window.nexus = new Nexus();
    });
</script>
</body>
</html>
